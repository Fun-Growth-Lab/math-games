<script>
'use strict';
// ============================================================
//  CONSTANTS
// ============================================================
const W=1280,H=720;
const CELL=100;       // px per grid cell (enlarged)
const GX=20,GY=20;   // grid top-left corner
const GN=5;           // 5×5 grid

// ── Triangle slot types (per cell, 4 slots) ──────────────
// t=0  UL: upper-left  (above \ diag)  verts: TL-TR-BL
// t=1  LR: lower-right (below \ diag)  verts: TR-BR-BL
// t=2  UR: upper-right (above / diag)  verts: TL-TR-BR
// t=3  LL: lower-left  (below / diag)  verts: TL-BR-BL
const ROT_T=[2,3,1,0];   // 90°CW rotation of type: 0→2→1→3→0
const FLIP_T=[2,3,0,1];  // horizontal flip: 0↔2, 1↔3

const ITEMS=[
  {emoji:'🎂',pt:30,color:'#f5c518'},
  {emoji:'🍩',pt:20,color:'#ff9800'},
  {emoji:'🍦',pt:15,color:'#81d4fa'},
  {emoji:'🍪',pt:10,color:'#a1887f'},
  {emoji:'⭐',pt:50,color:'#ffe082'},
];
const DIFF={
  easy:  {enemyRate:[0,0.30,0.02],stageTargets:[150,350,600,950,1400],hp:7,label:'やさしい'},
  normal:{enemyRate:[0,0.45,0.05],stageTargets:[250,550,900,1350,2000],hp:5,label:'ふつう'},
  hard:  {enemyRate:[0,0.60,0.10],stageTargets:[400,800,1300,1900,2700],hp:3,label:'むずかしい'},
};

// Colors
const COLOR_EMPTY='#1a2f1a';
const COLOR_GRID_LINE='rgba(255,255,255,0.10)';
const COLOR_DIAG='rgba(255,255,255,0.07)';
const COLOR_FILLED='#4caf50';
const COLOR_GHOST_OK='rgba(100,220,100,0.45)';
const COLOR_GHOST_BAD='rgba(220,60,60,0.40)';
const PIECE_COLORS=['#4caf50','#81d4fa','#ffb74d','#f06292','#ba68c8','#4dd0e1','#fff176','#a5d6a7'];

// ============================================================
//  PIECE DEFINITIONS
//  sq(r,c)    = full square at cell (r,c): fills slots t=0 AND t=1
//  tri(r,c,t) = half triangle at cell (r,c), slot type t
// ============================================================
function sq(r,c){return [{r,c,t:0},{r,c,t:1}];}
function tri(r,c,t){return [{r,c,t}];}

const PIECE_DEFS=[
  // ── ⭐1 (3 pieces) ──
  {id:0,stars:1,els:[...sq(0,0)]},                                              // 正方形
  {id:1,stars:1,els:[...tri(0,0,0)]},                                           // UL三角
  {id:2,stars:1,els:[...tri(0,0,1),...tri(1,0,0)]},                             // LR+UL ジグザグ
  // ── ⭐2 (5 pieces) ──
  {id:3,stars:2,els:[...sq(0,0),...sq(0,1)]},                                   // 横ドミノ
  {id:4,stars:2,els:[...sq(0,0),...sq(1,0)]},                                   // 縦ドミノ
  {id:5,stars:2,els:[...sq(0,0),...tri(0,1,0)]},                                // 正方形+右UL三角
  {id:6,stars:2,els:[...sq(0,0),...tri(1,0,0)]},                                // 正方形+下UL三角
  {id:7,stars:2,els:[...tri(0,0,1),...tri(0,1,0)]},                             // 横LR→UL
  // ── ⭐3 (9 pieces) ──
  {id:8, stars:3,els:[...sq(0,0),...sq(0,1),...sq(0,2)]},                       // I3
  {id:9, stars:3,els:[...sq(0,0),...sq(0,1),...sq(1,0)]},                       // L
  {id:10,stars:3,els:[...sq(0,0),...sq(0,1),...sq(1,1)]},                       // S
  {id:11,stars:3,els:[...sq(0,0),...sq(1,0),...sq(1,1)]},                       // Z
  {id:12,stars:3,els:[...sq(0,0),...sq(0,1),...tri(0,2,0)]},                    // ドミノ+右UL三角
  {id:13,stars:3,els:[...sq(0,0),...sq(0,1),...tri(1,0,0)]},                    // ドミノ+下UL三角
  {id:14,stars:3,els:[...sq(0,0),...sq(1,0),...tri(0,1,0)]},                    // 縦ドミノ+右UL三角
  {id:15,stars:3,els:[...sq(0,0),...tri(0,1,0),...tri(1,0,0)]},                 // 正方形+2UL三角
  {id:16,stars:3,els:[...sq(0,0),...sq(0,1),...tri(1,0,0),...tri(1,1,0)]},      // ドミノ+2UL三角
];

// ============================================================
//  TRANSFORM HELPERS
// ============================================================
function rotateEl({r,c,t}){return {r:c,c:-r,t:ROT_T[t]};}
function flipEl({r,c,t}){return {r,c:-c,t:FLIP_T[t]};}
function normalizeEls(els){
  const minR=Math.min(...els.map(e=>e.r));
  const minC=Math.min(...els.map(e=>e.c));
  return els.map(({r,c,t})=>({r:r-minR,c:c-minC,t}));
}
function transformPiece(baseEls,rot,flipped){
  let els=baseEls.map(e=>({...e}));
  for(let i=0;i<rot;i++) els=els.map(rotateEl);
  if(flipped) els=els.map(flipEl);
  return normalizeEls(els);
}
function getPieceEls(piece){
  return transformPiece(PIECE_DEFS[piece.defId].els,piece.rot,piece.flipped);
}
function getPieceStars(piece){return PIECE_DEFS[piece.defId].stars;}
function pieceColorIdx(defId){return defId%PIECE_COLORS.length;}

// ============================================================
//  GAME STATE
// ============================================================
let G={
  grid:new Uint8Array(GN*GN*4), // 4 slots per cell, 0=empty 1=filled
  items:[],    // [{r,c,type}]
  enemies:[],  // [{r,c,alive}]
  hand:[null,null,null],
  stock:null,
  nextBatch:[],
  selHand:-1,   // -1=none, 0-2=hand index, 'stock'
  hoverCell:null,
  score:0,hp:5,stage:1,turn:1,turnUsed:0,
  stageStars:0,stageScore:0,
  difficulty:'normal',
  phase:'title',won:false,
  playerName:'ゲスト',
  rankingTab:'LOCAL',
  rankingDataWorld:null,
  log:[],
  animFlash:[],
};

// ============================================================
//  GRID HELPERS
// ============================================================
function slotIdx(r,c,t){return (r*GN+c)*4+t;}
function isInBounds(r,c){return r>=0&&r<GN&&c>=0&&c<GN;}
function isSlotFilled(r,c,t){
  if(!isInBounds(r,c))return true;
  return G.grid[slotIdx(r,c,t)]===1;
}
function isCellCompletelyEmpty(r,c){
  if(!isInBounds(r,c))return false;
  const base=(r*GN+c)*4;
  for(let t=0;t<4;t++)if(G.grid[base+t])return false;
  if(G.items.some(i=>i.r===r&&i.c===c))return false;
  if(G.enemies.some(e=>e.alive&&e.r===r&&e.c===c))return false;
  return true;
}
function emptyCells(){
  const res=[];
  for(let r=0;r<GN;r++)for(let c=0;c<GN;c++){
    const base=(r*GN+c)*4;
    let anyFilled=false;
    for(let t=0;t<4;t++)if(G.grid[base+t]){anyFilled=true;break;}
    if(!anyFilled)res.push({r,c});
  }
  return res;
}

function placedElsAbsolute(piece,ar,ac){
  return getPieceEls(piece).map(({r,c,t})=>({r:r+ar,c:c+ac,t}));
}
function canPlace(piece,ar,ac){
  for(const {r,c,t} of placedElsAbsolute(piece,ar,ac)){
    if(!isInBounds(r,c)||isSlotFilled(r,c,t))return false;
  }
  return true;
}
function hasAnyValidPlacement(piece){
  for(let r=0;r<GN;r++)for(let c=0;c<GN;c++)if(canPlace(piece,r,c))return true;
  return false;
}

// ============================================================
//  CANVAS SETUP
// ============================================================
const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');

function rescale(){
  const sc=Math.min(window.innerWidth/W,window.innerHeight/H);
  const wrap=document.getElementById('wrapper');
  const tx=(window.innerWidth-W*sc)/2;
  const ty=(window.innerHeight-H*sc)/2;
  wrap.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;
}
window.addEventListener('resize',rescale);
rescale();

function cls(col='#111e11'){ctx.fillStyle=col;ctx.fillRect(0,0,W,H);}
function txt(s,x,y,sz,col,align='left',bold=false){
  ctx.font=`${bold?'800':'400'} ${sz}px 'M PLUS Rounded 1c',sans-serif`;
  ctx.fillStyle=col;ctx.textAlign=align;ctx.textBaseline='middle';
  ctx.fillText(s,x,y);
}
function roundRect(x,y,w,h,r,fill,stroke,lw=1){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
}

// Draw one half-triangle slot
function drawSlot(r,c,t,fill,stroke,lw=1){
  const x=GX+c*CELL, y=GY+r*CELL, C=CELL;
  ctx.beginPath();
  switch(t){
    case 0: ctx.moveTo(x,y);ctx.lineTo(x+C,y);ctx.lineTo(x,y+C);break;   // UL
    case 1: ctx.moveTo(x+C,y);ctx.lineTo(x+C,y+C);ctx.lineTo(x,y+C);break; // LR
    case 2: ctx.moveTo(x,y);ctx.lineTo(x+C,y);ctx.lineTo(x+C,y+C);break; // UR
    case 3: ctx.moveTo(x,y);ctx.lineTo(x+C,y+C);ctx.lineTo(x,y+C);break; // LL
  }
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
}

// ============================================================
//  DRAW GRID
// ============================================================
function drawGrid(){
  // Background
  roundRect(GX-3,GY-3,GN*CELL+6,GN*CELL+6,6,'#112211','#2e5a2e',2);

  // Cells
  for(let r=0;r<GN;r++){
    for(let c=0;c<GN;c++){
      const x=GX+c*CELL, y=GY+r*CELL, C=CELL;
      // Cell background
      roundRect(x+1,y+1,C-2,C-2,2,COLOR_EMPTY,null);
      // Diagonal guides
      ctx.strokeStyle=COLOR_DIAG;ctx.lineWidth=0.7;
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+C,y+C);ctx.stroke(); // \
      ctx.beginPath();ctx.moveTo(x+C,y);ctx.lineTo(x,y+C);ctx.stroke(); // /
      // Filled slots
      const base=(r*GN+c)*4;
      for(let t=0;t<4;t++){
        if(G.grid[base+t]){
          drawSlot(r,c,t,COLOR_FILLED,'rgba(0,0,0,0.2)',0.5);
        }
      }
      // Cell border
      ctx.strokeStyle=COLOR_GRID_LINE;ctx.lineWidth=1;
      ctx.strokeRect(x+0.5,y+0.5,C-1,C-1);
    }
  }

  // Items
  for(const it of G.items){
    const ix=GX+it.c*CELL+CELL/2, iy=GY+it.r*CELL+CELL/2;
    ctx.font='32px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ITEMS[it.type].emoji,ix,iy);
  }
  // Enemies
  for(const en of G.enemies){
    if(!en.alive)continue;
    const ex=GX+en.c*CELL+CELL/2, ey=GY+en.r*CELL+CELL/2;
    ctx.font='34px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('👾',ex,ey);
  }

  // Flash animations
  for(const f of G.animFlash){
    const fx=GX+f.c*CELL+CELL/2, fy=GY+f.r*CELL+CELL/2;
    ctx.globalAlpha=f.ttl/30;
    txt(f.text,fx,fy-f.sz*4,14+f.sz,f.color,'center',true);
    ctx.globalAlpha=1;
  }

  // Ghost piece (hover or drag)
  drawGhost();
}

function drawGhost(){
  if(G.phase!=='game')return;
  let piece=null;
  if(G.selHand==='stock') piece=G.stock;
  else if(G.selHand>=0&&G.selHand<3) piece=G.hand[G.selHand];
  if(!piece||!G.hoverCell)return;
  const {r:ar,c:ac}=G.hoverCell;
  const ok=canPlace(piece,ar,ac);
  const els=placedElsAbsolute(piece,ar,ac);
  const gfill=ok?COLOR_GHOST_OK:COLOR_GHOST_BAD;
  for(const {r,c,t} of els){
    if(isInBounds(r,c)) drawSlot(r,c,t,gfill,'rgba(255,255,255,0.3)',0.5);
  }
}

const BY=GY+GN*CELL+12;  // = 20+500+12 = 532
const CARD_H=H-BY-8;      // = 720-532-8 = 180
const CARD_W=192;
const CARD_GAP=8;
// Layout: [stock][hand0][hand1][hand2][next][sidebar]
const CARD_X=[GX, GX+CARD_W+CARD_GAP, GX+(CARD_W+CARD_GAP)*2, GX+(CARD_W+CARD_GAP)*3];
const NEXT_X=GX+(CARD_W+CARD_GAP)*4;
const SIDE_X=GX+(CARD_W+CARD_GAP)*5;
let btnRects={};

function drawPieceInCard(piece,bx,by,bw,bh,selected,label){
  const border=selected?'#4caf50':'#2e5a2e';
  const bg=selected?'#1a3a1a':'#131f13';
  roundRect(bx,by,bw,bh,10,bg,border,selected?2.5:1.5);
  if(label){txt(label,bx+bw/2,by+14,11,'#78909c','center');}
  if(!piece)return;
  const els=getPieceEls(piece);
  const stars=getPieceStars(piece);
  // Draw stars
  const starStr='⭐'.repeat(stars);
  ctx.font='12px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(starStr,bx+bw/2,by+bh-16);
  // Compute bounding box of piece
  const rows=Math.max(...els.map(e=>e.r))+1;
  const cols=Math.max(...els.map(e=>e.c))+1;
  const maxSz=Math.min((bw-16)/cols,(bh-44)/rows);
  const sz=Math.min(maxSz,52);
  const ox=bx+(bw-cols*sz)/2, oy=by+22+(bh-44-rows*sz)/2;
  // Draw each element
  const col=PIECE_COLORS[pieceColorIdx(piece.defId)];
  for(const {r,c,t} of els){
    const ex=ox+c*sz, ey=oy+r*sz, S=sz;
    ctx.beginPath();
    switch(t){
      case 0:ctx.moveTo(ex,ey);ctx.lineTo(ex+S,ey);ctx.lineTo(ex,ey+S);break;
      case 1:ctx.moveTo(ex+S,ey);ctx.lineTo(ex+S,ey+S);ctx.lineTo(ex,ey+S);break;
      case 2:ctx.moveTo(ex,ey);ctx.lineTo(ex+S,ey);ctx.lineTo(ex+S,ey+S);break;
      case 3:ctx.moveTo(ex,ey);ctx.lineTo(ex+S,ey+S);ctx.lineTo(ex,ey+S);break;
    }
    ctx.closePath();
    ctx.fillStyle=col;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=0.8;ctx.stroke();
    // diagonal guide
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=0.4;
    ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(ex+S,ey+S);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ex+S,ey);ctx.lineTo(ex,ey+S);ctx.stroke();
  }
}

function drawRotFlipBtns(bx,by,bw,bh,key){
  const ry=by+bh-30,rw=36,rh=22;
  const rx=bx+bw/2-38,fx=bx+bw/2+2;
  roundRect(rx,ry,rw,rh,5,'#2e7d32','#388e3c',1);
  txt('↺',rx+rw/2,ry+rh/2,14,'#fff','center',true);
  roundRect(fx,ry,rw,rh,5,'#e65100','#f57c00',1);
  txt('↔',fx+rw/2,ry+rh/2,14,'#fff','center',true);
  return {rot:{x:rx,y:ry,w:rw,h:rh},flip:{x:fx,y:ry,w:rw,h:rh}};
}

function drawBottomArea(){
  roundRect(GX-3,BY-3,W-GX-3,CARD_H+6,6,'#112211','#2e5a2e',2);
  btnRects={};

  // Stock
  const stockSel=G.selHand==='stock';
  drawPieceInCard(G.stock,CARD_X[0],BY,CARD_W,CARD_H,stockSel,'ストック');
  if(G.stock){const r=drawRotFlipBtns(CARD_X[0],BY,CARD_W,CARD_H,'stock');btnRects.stock_rot=r.rot;btnRects.stock_flip=r.flip;}
  btnRects.stock={x:CARD_X[0],y:BY,w:CARD_W,h:CARD_H-32};

  // Hand cards
  for(let i=0;i<3;i++){
    const bx=CARD_X[i+1], sel=G.selHand===i;
    // Dim if dragging this card
    if(drag.active&&drag.handIdx===i){
      ctx.globalAlpha=0.4;
      drawPieceInCard(G.hand[i],bx,BY,CARD_W,CARD_H,false,`手札${i+1}`);
      ctx.globalAlpha=1;
    } else {
      drawPieceInCard(G.hand[i],bx,BY,CARD_W,CARD_H,sel,`手札${i+1}`);
    }
    if(G.hand[i]){const r=drawRotFlipBtns(bx,BY,CARD_W,CARD_H,i);btnRects[`h${i}_rot`]=r.rot;btnRects[`h${i}_flip`]=r.flip;}
    btnRects[`h${i}`]={x:bx,y:BY,w:CARD_W,h:CARD_H-32};
  }

  // Stock (drag)
  if(drag.active&&drag.handIdx==='stock'){
    ctx.globalAlpha=0.4;
    drawPieceInCard(G.stock,CARD_X[0],BY,CARD_W,CARD_H,false,'ストック');
    ctx.globalAlpha=1;
  }

  // Next
  roundRect(NEXT_X,BY,CARD_W,CARD_H,10,'#1a1a2f','#7b1fa2',1.5);
  txt('NEXT',NEXT_X+CARD_W/2,BY+14,11,'#ce93d8','center');
  if(G.nextBatch.length>0) drawPieceInCard(G.nextBatch[0],NEXT_X+4,BY+22,CARD_W-8,CARD_H-28,false,null);

  // Sidebar
  const sx=SIDE_X, sw=W-SIDE_X-8;
  roundRect(sx,BY,sw,CARD_H,10,'#112211','#2e5a2e',1.5);
  btnRects.howto={x:sx+8,y:BY+12,w:sw-16,h:40};
  roundRect(sx+8,BY+12,sw-16,40,8,'#263238','#546e7a',1.5);
  txt('あそびかた',sx+8+(sw-16)/2,BY+32,13,'#eceff1','center');
  btnRects.title_btn={x:sx+8,y:BY+58,w:sw-16,h:40};
  roundRect(sx+8,BY+58,sw-16,40,8,'#263238','#546e7a',1.5);
  txt('タイトルへ',sx+8+(sw-16)/2,BY+78,13,'#eceff1','center');

  // Drag ghost: floating piece preview under cursor
  if(drag.active){
    const p=drag.handIdx==='stock'?G.stock:G.hand[drag.handIdx];
    if(p){
      const els=getPieceEls(p);
      const sz=40;
      const col=PIECE_COLORS[pieceColorIdx(p.defId)];
      const dx=drag.curX-sz,dy=drag.curY-sz;
      ctx.globalAlpha=0.75;
      for(const {r,c,t} of els){
        const ex=dx+c*sz,ey=dy+r*sz,S=sz;
        ctx.beginPath();
        switch(t){
          case 0:ctx.moveTo(ex,ey);ctx.lineTo(ex+S,ey);ctx.lineTo(ex,ey+S);break;
          case 1:ctx.moveTo(ex+S,ey);ctx.lineTo(ex+S,ey+S);ctx.lineTo(ex,ey+S);break;
          case 2:ctx.moveTo(ex,ey);ctx.lineTo(ex+S,ey);ctx.lineTo(ex+S,ey+S);break;
          case 3:ctx.moveTo(ex,ey);ctx.lineTo(ex+S,ey+S);ctx.lineTo(ex,ey+S);break;
        }
        ctx.closePath();ctx.fillStyle=col;ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;ctx.stroke();
      }
      ctx.globalAlpha=1;
    }
  }
}

// ============================================================
//  PIECE GENERATION
// ============================================================
function randomPiece(){
  const rv=Math.random();
  let pool;
  if(rv<0.20) pool=PIECE_DEFS.filter(p=>p.stars===1);
  else if(rv<0.60) pool=PIECE_DEFS.filter(p=>p.stars===2);
  else pool=PIECE_DEFS.filter(p=>p.stars===3);
  const def=pool[Math.floor(Math.random()*pool.length)];
  return {defId:def.id,rot:Math.floor(Math.random()*4),flipped:Math.random()<0.5};
}

// ============================================================
//  GAME INIT / TURN MANAGEMENT
// ============================================================
function addLog(s){G.log.push(s);if(G.log.length>40)G.log.shift();}

function startGame(){
  const diff=DIFF[G.difficulty];
  G.grid=new Uint8Array(GN*GN*4);
  G.items=[];G.enemies=[];
  G.hand=[null,null,null];G.stock=null;G.nextBatch=[];
  G.selHand=-1;G.hoverCell=null;
  G.score=0;G.hp=diff.hp;G.stage=1;G.turn=1;G.turnUsed=0;
  G.stageStars=0;G.stageScore=0;G.won=false;
  G.log=[];G.animFlash=[];
  G.phase='game';
  G.rankingDataWorld=null;
  howToVisible=false;
  // Pre-fill next batch
  for(let i=0;i<6;i++) G.nextBatch.push(randomPiece());
  document.getElementById('title-screen').classList.add('hidden');
  startTurn();
}

function dealHand(){
  for(let i=0;i<3;i++){
    G.hand[i]=G.nextBatch.shift();
    G.nextBatch.push(randomPiece());
  }
}

function spawnItems(){
  const emptys=emptyCells();
  if(emptys.length===0)return;
  const count=Math.min(3,emptys.length,Math.floor(Math.random()*3)+1);
  const shuffled=emptys.sort(()=>Math.random()-0.5).slice(0,count);
  for(const {r,c} of shuffled){
    G.items.push({r,c,type:Math.floor(Math.random()*ITEMS.length)});
  }
}

function spawnEnemies(){
  const diff=DIFF[G.difficulty];
  const [,p1,p2]=diff.enemyRate;
  const rv=Math.random();
  let count=0;
  if(rv<p2) count=2;
  else if(rv<p1) count=1;
  if(count===0)return;
  const candidates=emptyCells().filter(({r,c})=>!G.items.some(i=>i.r===r&&i.c===c)&&!G.enemies.some(e=>e.alive&&e.r===r&&e.c===c));
  const chosen=candidates.sort(()=>Math.random()-0.5).slice(0,count);
  for(const {r,c} of chosen) G.enemies.push({r,c,alive:true});
}

function startTurn(){
  addLog(`--- ターン${G.turn} ---`);
  G.turnUsed=0;
  dealHand();
  spawnItems();
  spawnEnemies();
}

function endTurn(){
  // expire items
  for(const it of G.items) addLog(`${ITEMS[it.type].emoji} 消えた`);
  G.items=[];
  // enemy damage
  const alive=G.enemies.filter(e=>e.alive);
  if(alive.length>0){
    G.hp-=alive.length;
    addLog(`👾 ${alive.length}ダメージ！ HP:${G.hp}`);
    if(G.hp<=0){G.phase='game_over';saveScore();return;}
  }
  G.enemies=G.enemies.filter(e=>e.alive);
  // discard remaining hand
  for(let i=0;i<3;i++) G.hand[i]=null;
  G.turn++;
  // stage clear?
  const target=DIFF[G.difficulty].stageTargets[G.stage-1];
  if(G.stageScore>=target){
    if(G.stage>=5){G.won=true;G.phase='game_over';saveScore();addLog('全ステージクリア！');return;}
    G.phase='stage_clear';
    return;
  }
  startTurn();
  const canAny=G.hand.some(p=>p&&hasAnyValidPlacement(p))||(G.stock&&hasAnyValidPlacement(G.stock));
  if(!canAny){addLog('おける場所がない...');G.phase='game_over';saveScore();}
}

function placePiece(piece,ar,ac){
  const els=placedElsAbsolute(piece,ar,ac);
  const stars=getPieceStars(piece);
  let area=0,itemBonus=0;
  const coveredItems=new Set(), defeatedEnemies=new Set();
  for(const {r,c,t} of els){
    G.grid[slotIdx(r,c,t)]=1;
    area++;
    const ii=G.items.findIndex(i=>i.r===r&&i.c===c);
    if(ii>=0) coveredItems.add(ii);
    const ei=G.enemies.findIndex(e=>e.alive&&e.r===r&&e.c===c);
    if(ei>=0) defeatedEnemies.add(ei);
  }
  // collect items
  [...coveredItems].sort((a,b)=>b-a).forEach(idx=>{
    const it=G.items[idx];
    itemBonus+=ITEMS[it.type].pt;
    addLog(`${ITEMS[it.type].emoji} GET! +${ITEMS[it.type].pt}`);
    G.animFlash.push({r:it.r,c:it.c,text:`+${ITEMS[it.type].pt}`,color:ITEMS[it.type].color,ttl:30,sz:0});
    G.items.splice(idx,1);
  });
  // defeat enemies
  [...defeatedEnemies].forEach(idx=>{
    G.enemies[idx].alive=false;
    addLog(`👾 撃破！`);
    G.animFlash.push({r:G.enemies[idx].r,c:G.enemies[idx].c,text:'撃破!',color:'#ef5350',ttl:25,sz:0});
  });
  G.enemies=G.enemies.filter(e=>e.alive);
  const turnScore=(area+itemBonus)*Math.max(1,stars);
  G.score+=turnScore;G.stageScore+=turnScore;G.stageStars+=stars;
  addLog(`+${turnScore}pt (${area}△ ×⭐${stars})`);
  G.animFlash.push({r:ar,c:ac,text:`+${turnScore}`,color:'#ffeb3b',ttl:30,sz:4});
}

function useHandPiece(handIdx,ar,ac){
  const piece=G.hand[handIdx];
  if(!piece||!canPlace(piece,ar,ac))return;
  placePiece(piece,ar,ac);
  G.hand[handIdx]=null;
  G.turnUsed++;G.selHand=-1;
  if(G.turnUsed>=2) setTimeout(endTurn,120);
}
function useStockPiece(ar,ac){
  if(!G.stock||!canPlace(G.stock,ar,ac))return;
  placePiece(G.stock,ar,ac);
  G.stock=null;
  G.turnUsed++;G.selHand=-1;
  if(G.turnUsed>=2) setTimeout(endTurn,120);
}
function putInStock(handIdx){
  G.stock=G.hand[handIdx]; // always overwrite
  G.hand[handIdx]=null;
  for(let i=0;i<3;i++) G.hand[i]=null;
  G.turnUsed=2;G.selHand=-1;
  addLog('ストックに保管');
  setTimeout(endTurn,120);
}

function saveScore(){
  const entry={name:G.playerName,score:G.score,stage:G.stage,difficulty:G.difficulty,date:new Date().toLocaleDateString('ja-JP')};
  const local=JSON.parse(localStorage.getItem('ts_local_ranking')||'[]');
  local.push(entry);
  localStorage.setItem('ts_local_ranking',JSON.stringify(local));
  window.saveOnlineScore(G.playerName,G.score,G.difficulty);
  // count clears only on full game win (all 5 stages cleared)
  if(G.won){
    const key=`ts_clears_${G.difficulty}`;
    const n=parseInt(localStorage.getItem(key)||'0')+1;
    localStorage.setItem(key,String(n));
  }
}

// ============================================================
//  INPUT — Mouse & Touch via Pointer Events
// ============================================================
function getCanvasXY(e){
  const rect=cvs.getBoundingClientRect();
  const scX=W/rect.width, scY=H/rect.height;
  return {mx:(e.clientX-rect.left)*scX, my:(e.clientY-rect.top)*scY};
}
function mouseToCell(mx,my){
  const c=Math.floor((mx-GX)/CELL), r=Math.floor((my-GY)/CELL);
  if(r<0||r>=GN||c<0||c>=GN)return null;
  return {r,c};
}
function hitTest(rect,mx,my){return rect&&mx>=rect.x&&mx<=rect.x+rect.w&&my>=rect.y&&my<=rect.y+rect.h;}

// Drag state
const drag={active:false,handIdx:null,curX:0,curY:0,pointerId:null};

cvs.addEventListener('pointermove',e=>{
  e.preventDefault();
  const {mx,my}=getCanvasXY(e);
  if(drag.active&&e.pointerId===drag.pointerId){
    drag.curX=mx;drag.curY=my;
    G.hoverCell=mouseToCell(mx,my);
    return;
  }
  if(G.phase==='game'&&!drag.active) G.hoverCell=mouseToCell(mx,my);
},{passive:false});

cvs.addEventListener('pointerdown',e=>{
  e.preventDefault();
  if(G.phase!=='game')return;
  const {mx,my}=getCanvasXY(e);
  if(howToVisible){if(btnRects.howto_close&&hitTest(btnRects.howto_close,mx,my))howToVisible=false;return;}
  // Check card areas for drag start
  for(let i=0;i<3;i++){
    if(G.hand[i]&&btnRects[`h${i}`]&&hitTest(btnRects[`h${i}`],mx,my)){
      G.selHand=i;
      drag.active=true;drag.handIdx=i;drag.curX=mx;drag.curY=my;drag.pointerId=e.pointerId;
      cvs.setPointerCapture(e.pointerId);
      return;
    }
  }
  if(G.stock&&btnRects.stock&&hitTest(btnRects.stock,mx,my)&&G.turnUsed<2){
    G.selHand='stock';
    drag.active=true;drag.handIdx='stock';drag.curX=mx;drag.curY=my;drag.pointerId=e.pointerId;
    cvs.setPointerCapture(e.pointerId);
    return;
  }
  // Not on card — handle as regular click
  handleGameClick(mx,my);
},{passive:false});

cvs.addEventListener('pointerup',e=>{
  e.preventDefault();
  if(drag.active&&e.pointerId===drag.pointerId){
    const cell=mouseToCell(drag.curX,drag.curY);
    if(cell&&G.phase==='game'){
      if(drag.handIdx==='stock') useStockPiece(cell.r,cell.c);
      else useHandPiece(drag.handIdx,cell.r,cell.c);
    }
    drag.active=false;drag.handIdx=null;G.hoverCell=null;
    cvs.releasePointerCapture(e.pointerId);
  }
},{passive:false});

cvs.addEventListener('pointercancel',e=>{
  drag.active=false;drag.handIdx=null;G.hoverCell=null;
});

function handleGameClick(mx,my){
  if(btnRects.howto&&hitTest(btnRects.howto,mx,my)){howToVisible=!howToVisible;return;}
  if(btnRects.title_btn&&hitTest(btnRects.title_btn,mx,my)){showTitle();return;}

  // Rotate/flip buttons
  for(let i=0;i<3;i++){
    if(btnRects[`h${i}_rot`]&&hitTest(btnRects[`h${i}_rot`],mx,my)&&G.hand[i]){G.hand[i].rot=(G.hand[i].rot+1)%4;return;}
    if(btnRects[`h${i}_flip`]&&hitTest(btnRects[`h${i}_flip`],mx,my)&&G.hand[i]){G.hand[i].flipped=!G.hand[i].flipped;return;}
  }
  if(btnRects.stock_rot&&hitTest(btnRects.stock_rot,mx,my)&&G.stock){G.stock.rot=(G.stock.rot+1)%4;return;}
  if(btnRects.stock_flip&&hitTest(btnRects.stock_flip,mx,my)&&G.stock){G.stock.flipped=!G.stock.flipped;return;}

  if(G.phase==='stage_clear'){handleStageClearClick(mx,my);return;}
  if(G.phase==='game_over'){handleGameOverClick(mx,my);return;}

  // Grid click → place selected piece
  const cell=mouseToCell(mx,my);
  if(cell){
    if(G.selHand==='stock') useStockPiece(cell.r,cell.c);
    else if(G.selHand>=0) useHandPiece(G.selHand,cell.r,cell.c);
    return;
  }

  // Card tap → select
  for(let i=0;i<3;i++){
    if(G.hand[i]&&btnRects[`h${i}`]&&hitTest(btnRects[`h${i}`],mx,my)){
      G.selHand=G.selHand===i?-1:i;return;
    }
  }
  if(btnRects.stock&&hitTest(btnRects.stock,mx,my)){
    if(G.stock&&G.turnUsed<2){G.selHand=G.selHand==='stock'?-1:'stock';}
    else if(!G.stock&&G.selHand>=0&&G.hand[G.selHand]&&G.turnUsed<2){putInStock(G.selHand);}
    return;
  }
}

function handleStageClearClick(mx,my){
  if(btnRects.sc_next&&hitTest(btnRects.sc_next,mx,my)){
    G.stage++;G.stageScore=0;G.stageStars=0;
    G.grid=new Uint8Array(GN*GN*4);G.items=[];G.enemies=[];
    G.turn=1;G.phase='game';startTurn();
  }
  if(btnRects.sc_title&&hitTest(btnRects.sc_title,mx,my)){showTitle();}
}
function handleGameOverClick(mx,my){
  if(btnRects.go_retry&&hitTest(btnRects.go_retry,mx,my)){startGame();}
  if(btnRects.go_title&&hitTest(btnRects.go_title,mx,my)){showTitle();}
  if(btnRects.go_ranking&&hitTest(btnRects.go_ranking,mx,my)){showRankingScreen();}
}

// ============================================================
//  TITLE SCREEN LOGIC (HTML-based)
// ============================================================
function showTitle(){
  G.phase='title';
  howToVisible=false;
  document.getElementById('title-screen').classList.remove('hidden');
  updatePlayerDisplay();
  updateClearCounts();
  // Show main menu, hide difficulty menu
  document.getElementById('title-main-menu').style.display='flex';
  document.getElementById('difficulty-menu').classList.add('hidden');
}

function updatePlayerDisplay(){
  document.getElementById('current-player-name-display').textContent=G.playerName;
}

function updateClearCounts(){
  ['easy','normal','hard'].forEach(d=>{
    const n=parseInt(localStorage.getItem(`ts_clears_${d}`)||'0');
    document.getElementById(`clear-${d}`).textContent=`${n}回クリア`;
    document.getElementById(`crown-${d}`).style.visibility=n>0?'visible':'hidden';
  });
}

// Title buttons
document.getElementById('btn-start-menu').addEventListener('click',()=>{
  document.getElementById('title-main-menu').style.display='none';
  document.getElementById('difficulty-menu').classList.remove('hidden');
  document.getElementById('difficulty-menu').style.display='flex';
});
document.getElementById('btn-back-to-menu').addEventListener('click',()=>{
  document.getElementById('difficulty-menu').classList.add('hidden');
  document.getElementById('title-main-menu').style.display='flex';
});
['easy','normal','hard'].forEach(d=>{
  document.getElementById(`btn-${d}`).addEventListener('click',()=>{
    G.difficulty=d;G.playerName=G.playerName||'ゲスト';
    startGame();
  });
});
document.getElementById('btn-view-ranking').addEventListener('click',()=>{
  showRankingScreen();
});

// Player manager
document.getElementById('player-select-btn').addEventListener('click',()=>{
  openPlayerManager();
});
document.getElementById('btn-close-player-manager').addEventListener('click',()=>{
  document.getElementById('player-manager').classList.add('hidden');
});
document.getElementById('btn-add-player').addEventListener('click',addPlayer);
document.getElementById('input-new-player').addEventListener('keydown',e=>{if(e.key==='Enter')addPlayer();});

function openPlayerManager(){
  document.getElementById('player-manager').classList.remove('hidden');
  renderPlayerList();
}
function addPlayer(){
  const inp=document.getElementById('input-new-player');
  const name=inp.value.trim();
  if(!name)return;
  const players=getPlayers();
  if(!players.includes(name)) players.push(name);
  savePlayers(players);
  selectPlayer(name);
  inp.value='';
  renderPlayerList();
}
function getPlayers(){return JSON.parse(localStorage.getItem('ts_players')||'[]');}
function savePlayers(p){localStorage.setItem('ts_players',JSON.stringify(p));}
function selectPlayer(name){
  G.playerName=name;
  localStorage.setItem('ts_current_player',name);
  updatePlayerDisplay();
}
function renderPlayerList(){
  const ul=document.getElementById('player-list-ul');
  const players=getPlayers();
  ul.innerHTML='';
  if(players.length===0){
    ul.innerHTML='<li style="color:#aaa;text-align:center;padding:12px;">まだ登録されていません</li>';
    return;
  }
  players.forEach(name=>{
    const li=document.createElement('li');li.className='player-item';
    if(name===G.playerName)li.classList.add('selected');
    const nm=document.createElement('span');nm.className='player-name';nm.textContent=name;
    const del=document.createElement('button');del.className='delete-btn';del.textContent='×';
    del.addEventListener('click',e=>{e.stopPropagation();
      const ps=getPlayers().filter(p=>p!==name);savePlayers(ps);
      if(G.playerName===name){G.playerName=ps[0]||'ゲスト';updatePlayerDisplay();}
      renderPlayerList();
    });
    li.appendChild(nm);li.appendChild(del);
    li.addEventListener('click',()=>{selectPlayer(name);renderPlayerList();});
    ul.appendChild(li);
  });
}

// Ranking screen
function showRankingScreen(){
  document.getElementById('ranking-screen').classList.remove('hidden');
  loadLocalRanking();
}
document.getElementById('btn-close-ranking').addEventListener('click',()=>{
  document.getElementById('ranking-screen').classList.add('hidden');
});
document.getElementById('btn-rank-local').addEventListener('click',()=>{
  document.getElementById('btn-rank-local').classList.add('active');
  document.getElementById('btn-rank-world').classList.remove('active');
  loadLocalRanking();
});
document.getElementById('btn-rank-world').addEventListener('click',()=>{
  document.getElementById('btn-rank-world').classList.add('active');
  document.getElementById('btn-rank-local').classList.remove('active');
  loadWorldRanking();
});

function renderRankingList(listId,data){
  const ul=document.getElementById(listId);
  ul.innerHTML='';
  if(!data||data.length===0){ul.innerHTML='<li style="color:#aaa;padding:8px;text-align:center;">データなし</li>';return;}
  const medals=['🥇','🥈','🥉'];
  data.forEach((d,i)=>{
    const li=document.createElement('li');
    li.innerHTML=`<span style="width:28px;display:inline-block;">${i<3?medals[i]:`${i+1}.`}</span><span style="flex:1;">${d.name||d.player_name||''}</span><span style="font-weight:800;color:#ff7043;">${(d.score||d.point_score||0).toLocaleString()}</span>`;
    ul.appendChild(li);
  });
}
function loadLocalRanking(){
  const all=JSON.parse(localStorage.getItem('ts_local_ranking')||'[]');
  ['easy','normal','hard'].forEach(d=>{
    const data=all.filter(e=>e.difficulty===d).sort((a,b)=>b.score-a.score).slice(0,10);
    renderRankingList(`rank-list-${d}`,data);
  });
}
function loadWorldRanking(){
  ['easy','normal','hard'].forEach(async d=>{
    renderRankingList(`rank-list-${d}`,[{name:'読み込み中...',score:0}]);
    const data=await window.fetchOnlineRanking(d);
    renderRankingList(`rank-list-${d}`,data||[]);
  });
}

// ============================================================
//  FRAME LOOP
// ============================================================
function frame(){
  requestAnimationFrame(frame);
  if(G.phase==='game'||G.phase==='stage_clear'||G.phase==='game_over') drawGame();
  G.animFlash=G.animFlash.filter(f=>{f.ttl--;f.sz+=0.4;return f.ttl>0;});
}

// Init
(function init(){
  const saved=localStorage.getItem('ts_current_player');
  if(saved) G.playerName=saved;
  updatePlayerDisplay();
  updateClearCounts();
  frame();
})();
</script>
