<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script>if(screen.orientation&&screen.orientation.lock){screen.orientation.lock('landscape').catch(function(){});}</script>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>TriSquare - Fun &amp; Growth Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-page:#010a18;
  --bg-cont:#03112a;
  --bdr:#1a4870;
  --bdr-dim:#0e3050;
  --accent:#38b2f8;
  --green:#3fd68a;
  --text-hi:#cce8ff;
  --text-main:#7aaec8;
  --text-dim:#3a6080;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  overflow:hidden;background:var(--bg-page);
  font-family:'Nunito','M PLUS Rounded 1c',sans-serif;
  user-select:none;-webkit-user-select:none;touch-action:none;
  display:flex;justify-content:center;align-items:center;
  height:100vh;width:100vw;
}
#container{
  width:1280px;height:720px;position:relative;
  background:linear-gradient(180deg,#051528 0%,#020d1e 100%);
  box-shadow:0 0 80px rgba(0,0,0,0.95),inset 0 0 60px rgba(0,0,0,0.25);
  border-radius:16px;overflow:hidden;
  transform-origin:center center;
  border:2px solid var(--bdr);
}
canvas{position:absolute;top:0;left:0;touch-action:none;}
.hidden{display:none!important;}
.ts-overlay{
  position:absolute;top:0;left:0;width:1280px;height:720px;
  display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:20;
}
/* TITLE */
#title-screen{background:radial-gradient(ellipse at 50% 30%,#0a2a4a 0%,#030e22 60%,#010810 100%);}
#title-screen::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(56,178,248,0.025) 40px,rgba(56,178,248,0.025) 41px),
             repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(56,178,248,0.025) 40px,rgba(56,178,248,0.025) 41px);
  pointer-events:none;
}
.title-box{
  background:rgba(0,0,0,0.5);border:2px solid var(--bdr);
  padding:40px 64px;border-radius:20px;
  display:flex;flex-direction:column;align-items:center;
  box-shadow:0 0 60px rgba(56,178,248,0.12),inset 0 0 40px rgba(0,0,0,0.3);
}
.title-h1{font-size:4.4rem;color:var(--accent);font-weight:800;letter-spacing:8px;
  text-shadow:0 0 40px rgba(56,178,248,0.7),0 0 80px rgba(56,178,248,0.3);margin-bottom:4px;}
.title-sub{color:var(--text-main);font-size:1.4rem;letter-spacing:10px;margin-bottom:32px;opacity:0.75;}
.btn{
  background:linear-gradient(to bottom,#0e3a70,#071e40);
  color:var(--text-hi);border:1px solid #2a6aaa;
  padding:13px 24px;border-radius:10px;cursor:pointer;
  font-size:1.1rem;margin:5px;font-weight:800;font-family:inherit;
  box-shadow:0 4px 0 #020e22,0 6px 14px rgba(0,0,0,0.5);
  transition:transform 0.1s;width:290px;-webkit-tap-highlight-color:transparent;
}
.btn:hover{transform:translateY(2px);box-shadow:0 2px 0 #020e22;}
.btn:active{transform:translateY(4px);box-shadow:none;}
.btn-green{background:linear-gradient(to bottom,#1a7a40,#0e4424);border-color:#2eaa60;box-shadow:0 4px 0 #040e08,0 6px 14px rgba(0,0,0,0.5);}
.btn-green:hover{box-shadow:0 2px 0 #040e08;}
.btn-red{background:linear-gradient(to bottom,#6a1820,#3e0e14);border-color:#8a3040;box-shadow:0 4px 0 #180408;}
.btn-red:hover{box-shadow:0 2px 0 #180408;}
.btn-gray{background:linear-gradient(to bottom,#1e2c3c,#101820);border-color:#2e4458;box-shadow:0 4px 0 #04080e;}
.btn-gray:hover{box-shadow:0 2px 0 #04080e;}
.btn-player{
  background:linear-gradient(to bottom,#0e4060,#062030);color:var(--text-hi);border:1px solid #1a6080;
  padding:13px 24px;border-radius:10px;cursor:pointer;font-size:1.05rem;margin:5px;
  font-weight:800;font-family:inherit;width:290px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:transform 0.1s;box-shadow:0 4px 0 #020c18,0 6px 14px rgba(0,0,0,0.5);
  -webkit-tap-highlight-color:transparent;
}
.btn-player:hover{transform:translateY(2px);box-shadow:0 2px 0 #020c18;}
.btn-player:active{transform:translateY(4px);box-shadow:none;}
.ts-diff-btn{width:148px;padding:20px 0;font-size:1.15rem;margin:0;}
.difficulty-container{display:flex;flex-direction:row;justify-content:center;align-items:flex-end;gap:20px;margin-bottom:16px;}
.diff-wrapper{display:flex;flex-direction:column;align-items:center;}
.ts-modal-bg{
  position:absolute;top:0;left:0;width:1280px;height:720px;
  background:rgba(0,0,0,0.65);z-index:30;display:flex;justify-content:center;align-items:center;
}
.ts-modal-box{
  background:#051528;color:var(--text-hi);padding:28px 32px;border-radius:24px;
  width:88%;max-width:820px;max-height:85vh;overflow-y:auto;
  border:2px solid var(--bdr);box-shadow:0 10px 40px rgba(0,0,0,0.5);
  font-family:'M PLUS Rounded 1c',sans-serif;
}
.ts-modal-box h2{font-size:1.4rem;color:var(--accent);margin-bottom:16px;text-align:center;border-bottom:2px dotted var(--bdr-dim);padding-bottom:10px;}
.add-player-form{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
.input-name{padding:10px;font-size:1rem;border-radius:10px;border:2px solid var(--bdr);background:#020d1e;color:var(--text-hi);width:200px;font-family:'M PLUS Rounded 1c',sans-serif;}
.player-list{list-style:none;padding:0;margin:12px 0;display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;}
.player-item{background:#061d3a;padding:10px 18px;border-radius:14px;display:flex;justify-content:space-between;align-items:center;border:2px solid transparent;cursor:pointer;transition:all 0.15s;}
.player-item:hover{border-color:var(--bdr);transform:translateY(-2px);}
.player-item.selected{border-color:var(--green);background:#0a2a1a;}
.player-name{font-size:1.15rem;font-weight:800;flex:1;text-align:left;color:var(--text-hi);}
.delete-btn{background:#7a1a1a;color:#fff;border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-weight:bold;line-height:30px;padding:0;font-size:1rem;}
</style>
</head>
<body>
<div id="container">
  <canvas id="cvs" width="1280" height="720"></canvas>

  <!-- TITLE SCREEN -->
  <div id="title-screen" class="ts-overlay">
    <div style="text-align:center;margin-bottom:20px;">
      <h1 class="title-h1">TriSquare</h1>
      <p class="title-sub">トライスクエア</p>
    </div>
    <div class="title-box">
      <div id="title-main-menu" style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <button id="btn-start-menu" class="btn btn-green" style="font-size:1.2rem;margin-bottom:10px;">はじめる</button>
        <button id="player-select-btn" class="btn-player">
          <span style="font-size:1.5rem;">👤</span>
          <span id="current-player-name-display">ゲスト</span>
          <span style="font-size:0.8rem;opacity:0.7;">(へんこう)</span>
        </button>
        <button id="btn-view-ranking" class="btn" style="background:linear-gradient(to bottom,#4a1a60,#28103a);border-color:#7a3aaa;">🏆 ランキング（準備中）</button>
        <button class="btn btn-gray" onclick="location.href='../index.html'">🏠 INDEXへ</button>
      </div>
      <div id="difficulty-menu" class="hidden" style="display:flex;flex-direction:column;align-items:center;">
        <p style="color:var(--text-main);margin-bottom:18px;font-size:1rem;">グリッドサイズをえらんでください</p>
        <div class="difficulty-container">
          <div class="diff-wrapper">
            <button id="btn-easy" class="btn btn-green ts-diff-btn">やさしい<br><span style="font-size:0.78rem;opacity:0.85;">3 × 3</span></button>
          </div>
          <div class="diff-wrapper">
            <button id="btn-normal" class="btn ts-diff-btn">ふつう<br><span style="font-size:0.78rem;opacity:0.85;">4 × 4</span></button>
          </div>
          <div class="diff-wrapper">
            <button id="btn-hard" class="btn btn-red ts-diff-btn">むずかしい<br><span style="font-size:0.78rem;opacity:0.85;">5 × 5</span></button>
          </div>
        </div>
        <button id="btn-back-to-menu" class="btn btn-gray" style="width:200px;margin-top:6px;">もどる</button>
      </div>
    </div>
  </div>

  <!-- PLAYER MANAGER -->
  <div id="player-manager" class="ts-modal-bg hidden">
    <div class="ts-modal-box">
      <h2>👤 プレーヤーをえらぶ</h2>
      <p style="font-size:0.9rem;color:var(--text-dim);text-align:center;margin-bottom:12px;">なまえをにゅうりょくしてね（12もじまで）</p>
      <div class="add-player-form">
        <input type="text" id="input-new-player" class="input-name" placeholder="なまえ" maxlength="12">
        <button id="btn-add-player" class="btn btn-green" style="width:auto;border-radius:10px;padding:8px 16px;">ついか</button>
      </div>
      <ul id="player-list-ul" class="player-list"></ul>
      <div style="text-align:center;margin-top:8px;">
        <button id="btn-close-player-manager" class="btn btn-gray" style="width:160px;">とじる</button>
      </div>
    </div>
  </div>

  <!-- RANKING (coming soon) -->
  <div id="ranking-screen" class="ts-modal-bg hidden">
    <div class="ts-modal-box" style="text-align:center;">
      <h2>🏆 ランキング</h2>
      <p style="font-size:3rem;margin:24px 0 16px;">🚧</p>
      <p style="font-size:1.1rem;color:var(--text-main);">ランキング機能は近日公開予定です。</p>
      <p style="margin-top:8px;font-size:0.9rem;color:var(--text-dim);">Coming Soon...</p>
      <div style="margin-top:24px;">
        <button id="btn-close-ranking" class="btn btn-gray" style="width:160px;">とじる</button>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';
// ============================================================
//  CANVAS / LAYOUT
// ============================================================
const W=1280, H=720;

// Left: grid area  Right: info + hand panel
const GRID_W=658;   // left portion width
const PX=670;       // right panel x
const PW=602;       // right panel width (1280-670-8=602)

// Triangle slot types (per cell): t=0=UL(\上), t=1=LR(\下) のみ使用
// 回転/フリップはセル位置のみ変換（t値は0/1のまま — 分類にないブロックが出ない）

// Colors
const C_BG  ='#020d1e';
const C_CELL='#061d3a';
const C_LINE='rgba(56,178,248,0.12)';
const C_DIAG='rgba(56,178,248,0.06)';
const C_FILL='#3fd68a';
const C_OK  ='rgba(63,214,138,0.36)';
const C_BAD ='rgba(220,60,60,0.30)';
const PC=['#3fd68a','#38b2f8','#f8a238','#f83880','#c838f8','#38f8f0','#f8f038','#e07060'];

// ============================================================
//  PIECE DEFINITIONS  (cat=分類, pts=点数)
// ============================================================
const sq=(r,c)=>[{r,c,t:0},{r,c,t:1}];
const tr=(r,c,t)=>[{r,c,t}];

// 辺接続ルール: t=1(r,c)↔t=0(r+1,c)[下辺], t=1(r,c)↔t=0(r,c+1)[右辺], t=0↔t=1[対角/同セル]
// t=0=UL(左上△), t=1=LR(右下△) — グリッドで使うスロットはこの2種のみ
const PIECE_DEFS=[
  // 分類1 (5pt): △1個 — 回転でt=0↔t=1(2通り配置可)
  {id:0,  cat:1, pts:5,  els:[...tr(0,0,0)]},
  // 分類2 (10pt): □1個
  {id:1,  cat:2, pts:10, els:[...sq(0,0)]},
  // 分類3 (20pt): △2連 辺接続
  {id:2,  cat:3, pts:20, els:[...tr(0,0,1),...tr(1,0,0)]},   // LR(0,0)+UL(1,0) 下辺接続
  {id:3,  cat:3, pts:20, els:[...tr(0,0,1),...tr(0,1,0)]},   // LR(0,0)+UL(0,1) 右辺接続
  // 分類4 (30pt): □+△ 辺接続
  {id:4,  cat:4, pts:30, els:[...sq(0,0),...tr(0,1,0)]},     // □+UL右 (LR右辺↔UL左辺)
  {id:5,  cat:4, pts:30, els:[...sq(0,0),...tr(1,0,0)]},     // □+UL下 (LR下辺↔UL上辺)
  {id:6,  cat:4, pts:30, els:[...tr(0,0,1),...sq(1,0)]},     // LR上+□下 (LR下辺↔UL上辺)
  // 分類5 (40pt): □□
  {id:7,  cat:5, pts:40, els:[...sq(0,0),...sq(0,1)]},       // □□横
  {id:8,  cat:5, pts:40, els:[...sq(0,0),...sq(1,0)]},       // □□縦
  // 分類6 (45pt): △3 T字 — 数学的に唯一の辺接続3△形
  {id:9,  cat:6, pts:45, els:[...tr(0,0,1),...tr(0,1,0),...tr(1,0,0)]}, // LR中心+UL右+UL下
  // 分類7 (60pt): 5△複合 辺接続確認済
  {id:10, cat:7, pts:60, els:[...sq(0,0),...sq(1,0),...tr(0,1,0)]},            // □□縦+△右上
  {id:11, cat:7, pts:60, els:[...sq(0,0),...tr(0,1,0),...tr(1,0,0)]},          // □+2△
  {id:12, cat:7, pts:60, els:[...sq(0,0),...sq(0,1),...tr(1,1,0)]},            // □□横+△右下
  {id:13, cat:7, pts:60, els:[...tr(0,0,1),...sq(0,1),...tr(1,1,0)]},          // Z字5△
  {id:14, cat:7, pts:60, els:[...sq(0,0),...sq(1,0),...tr(1,1,0)]},            // □□縦+△右下
  // 分類8 (75pt): 6△複合 辺接続確認済
  {id:15, cat:8, pts:75, els:[...sq(0,0),...sq(0,1),...tr(0,2,0)]},            // □□+△端
  {id:16, cat:8, pts:75, els:[...sq(0,0),...sq(0,1),...tr(1,0,0)]},            // □□+△左下
  {id:17, cat:8, pts:75, els:[...sq(0,0),...sq(0,1),...tr(1,0,0),...tr(1,1,0)]},// □□+2△下
  {id:18, cat:8, pts:75, els:[...sq(0,0),...sq(1,0),...tr(0,1,0),...tr(1,1,0)]},// □□縦+2△右
  // 分類9 (90pt): □□□/L字
  {id:19, cat:9, pts:90, els:[...sq(0,0),...sq(0,1),...sq(0,2)]},              // □□□横
  {id:20, cat:9, pts:90, els:[...sq(0,0),...sq(0,1),...sq(1,0)]},              // L字
  {id:21, cat:9, pts:90, els:[...sq(0,0),...sq(0,1),...sq(1,1)]},              // J字
  {id:22, cat:9, pts:90, els:[...sq(0,0),...sq(1,0),...sq(1,1)]},              // L字縦
];

// 分類別確率テーブル (cat1〜9, 合計=100%)
const DIFF_PROB={
  easy:  [25,25,15,15,20, 0, 0, 0, 0],
  normal:[20,20,10,10,10, 0,10,10,10],
  hard:  [15,15,10,10,10,10,10,10,10],
};

// ============================================================
//  TRANSFORMS
// ============================================================
// 90°CW(スクリーン座標): UL(0)→UR(2)→LR(1)→LL(3)→UL(0)
const ROT_T=[2,3,1,0];
// 水平反転: UL(0)↔UR(2), LR(1)↔LL(3)
const FLIP_T=[2,3,0,1];
// 位置変換: r'=c, c'=−r (時計回りCW) + t変換
const rotEl=({r,c,t})=>({r:c, c:-r, t:ROT_T[t]});
const flpEl=({r,c,t})=>({r, c:-c, t:FLIP_T[t]});
function norm(els){
  const mr=Math.min(...els.map(e=>e.r)), mc=Math.min(...els.map(e=>e.c));
  return els.map(({r,c,t})=>({r:r-mr,c:c-mc,t}));
}
function xform(base,rot,flip){
  let e=base.map(x=>({...x}));
  for(let i=0;i<rot;i++) e=e.map(rotEl);
  if(flip) e=e.map(flpEl);
  e=norm(e);
  // 同セルにt=2+t=3が共存 = 回転した正方形 → t=0+t=1に正規化
  const cellT={};
  for(const el of e){const k=`${el.r},${el.c}`;(cellT[k]=cellT[k]||new Set()).add(el.t);}
  return e.map(el=>{
    const ts=cellT[`${el.r},${el.c}`];
    if(ts.has(2)&&ts.has(3)) return{r:el.r,c:el.c,t:el.t===2?0:1};
    return el;
  });
}
const getPEls=p=>xform(PIECE_DEFS[p.defId].els, p.rot, p.flipped);
const pci=id=>id%PC.length;


// ============================================================
//  DYNAMIC GRID  (GN*CELL = 600 for all difficulties)
// ============================================================
let GN=5, CELL=120, GX=29, GY=60;
const GN_CELL={3:200, 4:150, 5:120};

function setLayout(){
  CELL=GN_CELL[GN];
  const sz=GN*CELL;            // always 600
  GX=Math.floor((GRID_W-sz)/2);  // (658-600)/2=29
  GY=Math.floor((H-sz)/2);       // (720-600)/2=60
}

// ============================================================
//  GAME STATE
// ============================================================
let G={
  grid:null,
  hand:[null,null,null],
  selHand:-1, hoverCell:null,
  score:0, placed:0,
  areaScore:0,   // 面積ポイント累計 (△1個=5pt)
  catScore:0,    // 分類ポイント累計
  bonusPoint:0,  // ボーナス倍率 (0.1ずつ増加)
  bonusCell:null,// 今光っている △スロット {r,c,t}
  placedSinceDiscard:0,
  stage:1,
  difficulty:'normal',
  phase:'title',
  playerName:'ゲスト',
  flash:[],
};

// ============================================================
//  GRID HELPERS
// ============================================================
const gIdx=(r,c,t)=>(r*GN+c)*4+t;
const inB=(r,c)=>r>=0&&r<GN&&c>=0&&c<GN;
const isFilled=(r,c,t)=>!inB(r,c)||G.grid[gIdx(r,c,t)]===1;
const absEls=(p,ar,ac)=>getPEls(p).map(({r,c,t})=>({r:r+ar,c:c+ac,t}));
function canPlace(p,ar,ac){return absEls(p,ar,ac).every(({r,c,t})=>inB(r,c)&&!isFilled(r,c,t));}

// Check ALL 8 orientations (4 rot × 2 flip) so rotation is accounted for
function anyValid(p){
  for(let rot=0;rot<4;rot++) for(let flip=0;flip<2;flip++){
    const pp={...p,rot,flipped:!!flip};
    for(let r=0;r<GN;r++) for(let c=0;c<GN;c++) if(canPlace(pp,r,c)) return true;
  }
  return false;
}
const maxTri=()=>GN*GN*2;   // t=0,t=1のみ使用

// ============================================================
//  CANVAS SETUP
// ============================================================
const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
// HiDPIディスプレイ対応: canvas内部解像度をDPR倍にしてテキストを鮮明化
(function(){
  const dpr=Math.min(window.devicePixelRatio||1,3);
  cvs.width=W*dpr; cvs.height=H*dpr;
  cvs.style.width=W+'px'; cvs.style.height=H+'px';
  ctx.scale(dpr,dpr);
})();
function rescale(){
  const sc=Math.min(window.innerWidth/W, window.innerHeight/H);
  document.getElementById('container').style.transform=`scale(${sc})`;
}
window.addEventListener('resize',rescale);
rescale();

function rr(x,y,w,h,r,fill,stroke,lw=1){
  if(w<=0||h<=0) return;
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
}
function tx(s,x,y,sz,col,align='left',bold=false){
  ctx.font=`${bold?'800':'400'} ${sz}px 'Nunito','M PLUS Rounded 1c',sans-serif`;
  ctx.fillStyle=col;ctx.textAlign=align;ctx.textBaseline='middle';
  ctx.fillText(s,x,y);
}

// ============================================================
//  DRAW TRIANGLE (generic position)
// ============================================================
function drawTri(x,y,S,t,fill,stroke,lw=0.5){
  ctx.beginPath();
  switch(t){
    case 0:ctx.moveTo(x,y);  ctx.lineTo(x+S,y);  ctx.lineTo(x,y+S);  break;
    case 1:ctx.moveTo(x+S,y);ctx.lineTo(x+S,y+S);ctx.lineTo(x,y+S);  break;
    case 2:ctx.moveTo(x,y);  ctx.lineTo(x+S,y);  ctx.lineTo(x+S,y+S);break;
    case 3:ctx.moveTo(x,y);  ctx.lineTo(x+S,y+S);ctx.lineTo(x,y+S);  break;
  }
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
}
const gridTri=(r,c,t,fill,stroke,lw)=>drawTri(GX+c*CELL,GY+r*CELL,CELL,t,fill,stroke,lw);

//  DRAW GRID
// ============================================================
function drawGrid(){
  rr(GX-5,GY-5,GN*CELL+10,GN*CELL+10,10,'#020c1e','#1a4870',2);
  for(let r=0;r<GN;r++) for(let c=0;c<GN;c++){
    const x=GX+c*CELL,y=GY+r*CELL;
    rr(x+1,y+1,CELL-2,CELL-2,2,C_CELL,null);
    ctx.strokeStyle=C_DIAG;ctx.lineWidth=0.6;
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+CELL,y+CELL);ctx.stroke();
    // /対角線はt=2,t=3スロット用だが未使用のため描画しない
    const base=(r*GN+c)*4;
    for(let t=0;t<4;t++) if(G.grid[base+t]) gridTri(r,c,t,C_FILL,'rgba(0,0,0,0.1)',0.3);
    ctx.strokeStyle=C_LINE;ctx.lineWidth=1;
    ctx.strokeRect(x+0.5,y+0.5,CELL-1,CELL-1);
  }
  // ボーナスセル光るエフェクト
  if(G.bonusCell){
    const{r:br,c:bc,t:bt}=G.bonusCell;
    const pulse=0.45+0.35*Math.sin(Date.now()/180);
    ctx.save();
    ctx.globalAlpha=pulse;
    gridTri(br,bc,bt,'#ffe040',null,0);
    ctx.restore();
    ctx.save();
    ctx.globalAlpha=pulse*0.7;
    gridTri(br,bc,bt,null,'#ffd700',2.5);
    ctx.restore();
  }
  // Score pop-up animations
  ctx.save();
  G.flash.forEach(f=>{
    ctx.globalAlpha=f.ttl/28;
    tx(f.text,GX+f.c*CELL+CELL/2,GY+f.r*CELL+CELL/2-f.sz*5,18+f.sz,f.col||'#ffe066','center',true);
  });
  ctx.restore();
  // Ghost piece
  if(G.phase==='game'){
    const p=G.selHand>=0?G.hand[G.selHand]:null;
    if(p&&G.hoverCell){
      const{r:ar,c:ac}=G.hoverCell, ok=canPlace(p,ar,ac);
      absEls(p,ar,ac).forEach(({r,c,t})=>{
        if(inB(r,c)) gridTri(r,c,t,ok?C_OK:C_BAD,'rgba(255,255,255,0.15)',0.4);
      });
    }
  }
}

let BR={};  // clickable button rects

function drawPieceCard(p,bx,by,bw,bh,sel,dim){
  if(dim) ctx.globalAlpha=0.30;
  rr(bx,by,bw,bh,10,sel?'#0a2a1a':'#030e22',sel?'#3fd68a':'#1a4870',sel?2.5:1.5);
  if(p){
    const els=getPEls(p);
    const rows=Math.max(...els.map(e=>e.r))+1, cols=Math.max(...els.map(e=>e.c))+1;
    // No stars — use full card height for piece
    const sz=Math.min(Math.min((bw-20)/cols,(bh-20)/rows),80);
    const ox=bx+(bw-cols*sz)/2, oy=by+(bh-rows*sz)/2;
    const col=PC[pci(p.defId)];
    for(const {r,c,t} of els){
      const x=ox+c*sz, y=oy+r*sz;
      drawTri(x,y,sz,t,col,'rgba(0,0,0,0.22)',1.2);
      // subtle diagonal guides inside piece
      ctx.strokeStyle='rgba(255,255,255,0.09)';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+sz,y+sz);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+sz,y);ctx.lineTo(x,y+sz);ctx.stroke();
    }
  }
  if(dim) ctx.globalAlpha=1;
}

function drawHand(){
  BR={};
  const canDiscard=G.placedSinceDiscard>=2;

  for(let i=0;i<3;i++){
    const bx=cardX(i), sel=G.selHand===i, dim=drag.active&&drag.handIdx===i;
    drawPieceCard(G.hand[i],bx,CY,CARD_W,CH,sel,dim);
    BR[`h${i}`]={x:bx,y:CY,w:CARD_W,h:CH};

    if(G.hand[i]){
      // ── Rotate / Flip buttons (bigger) ──
      const rby=CY+CH+6, rbh=46, rw=(CARD_W-8)/2;
      const rx=bx, fx=bx+rw+8;
      rr(rx,rby,rw,rbh,8,'#0e3a18','#1a6a30',2);
      tx('↻',rx+rw/2,rby+rbh/2,26,'#3fd68a','center',true);
      rr(fx,rby,rw,rbh,8,'#3a1a0a','#7a3a0a',2);
      tx('↔',fx+rw/2,rby+rbh/2,26,'#f8a238','center',true);
      BR[`r${i}`]={x:rx,y:rby,w:rw,h:rbh};
      BR[`f${i}`]={x:fx,y:rby,w:rw,h:rbh};

      // ── Discard (trash) button: 色だけで3段階表示、テキストなし ──
      const dby=rby+rbh+6, dbh=44;
      const active=canDiscard&&!dim;
      const lvl=G.placedSinceDiscard;  // 0,1,2+

      if(active){
        // 使える: 赤背景+赤枠
        rr(bx,dby,CARD_W,dbh,8,'#3a0808','#cc3333',2);
      } else {
        // ベース: 暗い灰色
        rr(bx,dby,CARD_W,dbh,8,'#0d0d1a','#232338',1.5);
        if(lvl===1){
          // 1回置いた: 左半分だけ薄い赤で塗る
          ctx.save();
          ctx.beginPath();ctx.rect(bx,dby,CARD_W/2,dbh);ctx.clip();
          ctx.fillStyle='rgba(180,40,40,0.30)';
          ctx.fillRect(bx,dby,CARD_W/2,dbh);
          ctx.restore();
        }
      }

      // 🗑️ emoji センタリング (テキストなし)
      ctx.save();
      ctx.globalAlpha=active?1:lvl===1?0.55:0.22;
      ctx.font='26px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🗑️',bx+CARD_W/2,dby+dbh/2);
      ctx.restore();

      BR[`d${i}`]={x:bx,y:dby,w:CARD_W,h:dbh,active};
    }
  }

  // ── Sub-buttons row (ステータスメッセージなし) ──
  const subY=CY+CH+6+46+6+44+8;
  const hw=Math.floor((PW-20)/2);
  BR.howto={x:PX+4,y:subY,w:hw,h:42};
  rr(PX+4,subY,hw,42,8,'#020d1e','#1a4870',1.5);
  tx('あそびかた',PX+4+hw/2,subY+21,16,'#7aaec8','center');
  BR.back={x:PX+4+hw+12,y:subY,w:hw,h:42};
  rr(PX+4+hw+12,subY,hw,42,8,'#020d1e','#1a4870',1.5);
  tx('タイトルへ',PX+4+hw+12+hw/2,subY+21,16,'#7aaec8','center');

  // ── Drag floating piece ──
  if(drag.active){
    const p=G.hand[drag.handIdx];
    if(p){
      const els=getPEls(p),sz=52,col=PC[pci(p.defId)];
      ctx.save();ctx.globalAlpha=0.85;
      for(const {r,c,t} of els)
        drawTri(drag.curX-sz+c*sz, drag.curY-sz+r*sz, sz, t, col,'rgba(255,255,255,0.5)',1.5);
      ctx.restore();
    }
  }
}

function drawGame(){
  ctx.fillStyle=C_BG;ctx.fillRect(0,0,W,H);
  drawGrid();
  drawInfo();
  drawHand();
  if(G.phase==='game_over')    drawGameOver();
  else if(G.phase==='stage_clear') drawStageClear();

  G.flash=G.flash.filter(f=>{f.ttl--;f.sz+=0.5;return f.ttl>0;});
}

// ============================================================
//  PIECE GENERATION  (分類別確率)
// ============================================================
function mkPiece(){
  const probs=DIFF_PROB[G.difficulty]||DIFF_PROB.normal;
  const total=probs.reduce((a,b)=>a+b,0);
  let rv=Math.random()*total, cum=0, cat=1;
  for(let i=0;i<probs.length;i++){cum+=probs[i];if(rv<cum){cat=i+1;break;}}
  const pool=PIECE_DEFS.filter(d=>d.cat===cat);
  if(!pool.length) return mkPiece();
  const def=pool[Math.floor(Math.random()*pool.length)];
  return{defId:def.id,rot:Math.floor(Math.random()*4),flipped:Math.random()<0.5};
}

// ============================================================
//  GAME START / NEXT STAGE
// ============================================================
// ランダムな空きt=0/t=1スロットを選んで光らせる
function pickBonusCell(){
  const empty=[];
  for(let r=0;r<GN;r++) for(let c=0;c<GN;c++)
    for(let t=0;t<2;t++) if(!G.grid[gIdx(r,c,t)]) empty.push({r,c,t});
  G.bonusCell=empty.length?empty[Math.floor(Math.random()*empty.length)]:null;
}
function _initGrid(){
  GN={easy:3,normal:4,hard:5}[G.difficulty]||5;
  setLayout();
  G.grid=new Uint8Array(GN*GN*4);
  G.hand=[mkPiece(),mkPiece(),mkPiece()];
  G.selHand=-1; G.hoverCell=null;
  G.placed=0; G.placedSinceDiscard=0;
  G.flash=[]; G.phase='game';
  howTo=false; drag.active=false;
  pickBonusCell();  // 最初のボーナスセル設定
}
function startGame(){
  G.score=0; G.stage=1;
  G.areaScore=0; G.catScore=0; G.bonusPoint=0; G.bonusCell=null;
  _initGrid();
  document.getElementById('title-screen').classList.add('hidden');
}
function nextStage(){
  G.stage++;
  _initGrid();
}

// ============================================================
//  PLACE PIECE  (score=分類の点数)
// ============================================================
function place(hi,ar,ac){
  const p=G.hand[hi];
  if(!p||!canPlace(p,ar,ac)) return;
  const els=absEls(p,ar,ac);
  let n=0;
  let bonusHit=false;
  for(const {r,c,t} of els){
    G.grid[gIdx(r,c,t)]=1; n++; G.placed++;
    if(G.bonusCell&&G.bonusCell.r===r&&G.bonusCell.c===c&&G.bonusCell.t===t) bonusHit=true;
  }
  // スコア計算: (面積+分類) × (1+ボーナス)
  const areaPts=n*5;
  const catPts=PIECE_DEFS[p.defId]?.pts||0;
  G.areaScore+=areaPts;
  G.catScore+=catPts;
  if(bonusHit){
    G.bonusPoint+=0.1;
    G.flash.push({r:ar,c:ac,text:'BONUS +0.1',ttl:40,sz:0,col:'#ffe566'});
  }
  G.score=Math.floor((G.areaScore+G.catScore)*(1+G.bonusPoint));
  const showPts=areaPts+catPts;
  G.flash.push({r:ar,c:ac,text:'+'+showPts,ttl:32,sz:0,col:'#3fd68a'});
  if(G.placedSinceDiscard<2) G.placedSinceDiscard++;
  G.hand[hi]=mkPiece();
  G.selHand=-1;
  // 全マス埋まった → ステージクリア
  if(G.placed>=maxTri()){G.phase='stage_clear'; return;}
  // 次のボーナスセルを設定
  pickBonusCell();
  // 置けない かつ 捨てられない → ゲームオーバー
  const canDiscard=G.placedSinceDiscard>=2;
  if(!canDiscard&&!G.hand.some(p2=>p2&&anyValid(p2))) G.phase='game_over';
}

// ============================================================
//  DISCARD PIECE
// ============================================================
function discard(hi){
  if(!G.hand[hi]||G.placedSinceDiscard<2) return;
  G.hand[hi]=mkPiece();
  G.placedSinceDiscard=0;  // reset — need 2 more placements
  G.selHand=-1;
}

// ============================================================
//  INPUT  (pointer events)
// ============================================================
function toXY(e){
  const r=cvs.getBoundingClientRect();
  return {mx:(e.clientX-r.left)*W/r.width, my:(e.clientY-r.top)*H/r.height};
}
function toCell(mx,my){
  const c=Math.floor((mx-GX)/CELL), r=Math.floor((my-GY)/CELL);
  return (r>=0&&r<GN&&c>=0&&c<GN)?{r,c}:null;
}
const hit=(b,mx,my)=>b&&mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h;

const drag={active:false,handIdx:0,curX:0,curY:0,startX:0,startY:0,pid:null};

cvs.addEventListener('pointermove',e=>{
  e.preventDefault();
  const{mx,my}=toXY(e);
  if(drag.active&&e.pointerId===drag.pid){
    drag.curX=mx; drag.curY=my; G.hoverCell=toCell(mx,my);
  } else if(G.phase==='game'){
    G.hoverCell=toCell(mx,my);
  }
},{passive:false});

cvs.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const{mx,my}=toXY(e);
  // How-to overlay
  if(howTo){if(hit(BR.htclose,mx,my)) howTo=false; return;}
  // Stage clear overlay
  if(G.phase==='stage_clear'){
    if(hit(BR.next,  mx,my)) nextStage();
    else if(hit(BR.title2,mx,my)) showTitle();
    else if(hit(BR.rank2, mx,my)) showRanking();
    return;
  }
  // Game over overlay
  if(G.phase==='game_over'){
    if(hit(BR.retry, mx,my)) startGame();
    else if(hit(BR.title2,mx,my)) showTitle();
    else if(hit(BR.rank2, mx,my)) showRanking();
    return;
  }
  if(G.phase!=='game') return;

  // Start drag from hand card
  for(let i=0;i<3;i++){
    if(G.hand[i]&&hit(BR[`h${i}`],mx,my)){
      G.selHand=i;
      drag.active=true; drag.handIdx=i;
      drag.curX=mx; drag.curY=my;
      drag.startX=mx; drag.startY=my;
      drag.pid=e.pointerId;
      cvs.setPointerCapture(e.pointerId);
      return;
    }
  }
  // Rotate / flip ボタン
  for(let i=0;i<3;i++){
    if(G.hand[i]&&hit(BR[`r${i}`],mx,my)){
      G.hand[i].rot=(G.hand[i].rot+1)%4; return;
    }
    if(G.hand[i]&&hit(BR[`f${i}`],mx,my)){
      G.hand[i].flipped=!G.hand[i].flipped; return;
    }
  }
  // Discard
  for(let i=0;i<3;i++){
    const db=BR[`d${i}`];
    if(db&&db.active&&hit(db,mx,my)){discard(i); return;}
  }
  // Sub-buttons
  if(hit(BR.howto,mx,my)){howTo=!howTo; return;}
  if(hit(BR.back, mx,my)){showTitle(); return;}
  // Grid tap → place selected piece
  const cell=toCell(mx,my);
  if(cell&&G.selHand>=0){place(G.selHand,cell.r,cell.c); return;}
},{passive:false});

cvs.addEventListener('pointerup',e=>{
  e.preventDefault();
  if(drag.active&&e.pointerId===drag.pid){
    const dx=drag.curX-drag.startX, dy=drag.curY-drag.startY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<12){
      // タップ: 選択のみ（回転は↻ボタンで）
      if(G.phase==='game') G.selHand=drag.handIdx;
    } else {
      // ドラッグ→ドロップ: place
      const cell=toCell(drag.curX,drag.curY);
      if(cell&&G.phase==='game') place(drag.handIdx,cell.r,cell.c);
    }
    drag.active=false; G.hoverCell=null;
    try{cvs.releasePointerCapture(e.pointerId);}catch(_){}
  }
},{passive:false});
cvs.addEventListener('pointercancel',()=>{drag.active=false; G.hoverCell=null;});

  document.getElementById('btn-'+d).addEventListener('click',()=>{G.difficulty=d; startGame();});
});
document.getElementById('btn-view-ranking').addEventListener('click',showRanking);
document.getElementById('btn-close-ranking').addEventListener('click',()=>document.getElementById('ranking-screen').classList.add('hidden'));
document.getElementById('player-select-btn').addEventListener('click',openPM);
document.getElementById('btn-close-player-manager').addEventListener('click',()=>document.getElementById('player-manager').classList.add('hidden'));
document.getElementById('btn-add-player').addEventListener('click',addP);
document.getElementById('input-new-player').addEventListener('keydown',e=>{if(e.key==='Enter')addP();});

// Player manager
function getPs(){return JSON.parse(localStorage.getItem('ts_players')||'[]');}
function savePs(a){localStorage.setItem('ts_players',JSON.stringify(a));}
function selP(n){G.playerName=n; localStorage.setItem('ts_current_player',n); updPlayer();}
function openPM(){document.getElementById('player-manager').classList.remove('hidden'); renderPL();}
function addP(){
  const inp=document.getElementById('input-new-player');
  const n=inp.value.trim(); if(!n)return;
  const ps=getPs(); if(!ps.includes(n))ps.push(n);
  savePs(ps); selP(n); inp.value=''; renderPL();
}
function renderPL(){
  const ul=document.getElementById('player-list-ul');
  const ps=getPs(); ul.innerHTML='';
  if(!ps.length){ul.innerHTML='<li style="color:#3a6080;text-align:center;padding:12px;">まだ登録されていません</li>';return;}
  ps.forEach(n=>{
    const li=document.createElement('li'); li.className='player-item';
    if(n===G.playerName) li.classList.add('selected');
    const nm=document.createElement('span'); nm.className='player-name'; nm.textContent=n;
    const del=document.createElement('button'); del.className='delete-btn'; del.textContent='×';
    del.addEventListener('click',ev=>{ev.stopPropagation();
      const a=getPs().filter(x=>x!==n); savePs(a);
      if(G.playerName===n){G.playerName=a[0]||'ゲスト'; updPlayer();} renderPL();});
    li.appendChild(nm); li.appendChild(del);
    li.addEventListener('click',()=>{selP(n); renderPL();});
    ul.appendChild(li);
  });
}

// ============================================================
//  FRAME LOOP
// ============================================================
(function loop(){
  requestAnimationFrame(loop);
  if(G.phase==='game'||G.phase==='game_over'||G.phase==='stage_clear') drawGame();
})();

(function(){
  const s=localStorage.getItem('ts_current_player');
  if(s) G.playerName=s;
  updPlayer();
})();
</script>
