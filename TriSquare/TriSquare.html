<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script>if(screen.orientation&&screen.orientation.lock){screen.orientation.lock('landscape').catch(function(){});}</script>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>TriSquare - Fun &amp; Growth Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-page:#010a18;
  --bg-cont:#03112a;
  --bdr:#1a4870;
  --bdr-dim:#0e3050;
  --accent:#38b2f8;
  --green:#3fd68a;
  --text-hi:#cce8ff;
  --text-main:#7aaec8;
  --text-dim:#3a6080;
}
html{overflow:hidden;width:100%;height:100%;}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  overflow:hidden;background:var(--bg-page);
  font-family:'Nunito','M PLUS Rounded 1c',sans-serif;
  user-select:none;-webkit-user-select:none;touch-action:none;
  display:flex;justify-content:center;align-items:center;
  height:100%;width:100%;
}
#container{
  width:1280px;height:720px;position:relative;
  flex-shrink:0;
  background:linear-gradient(180deg,#051528 0%,#020d1e 100%);
  box-shadow:0 0 80px rgba(0,0,0,0.95),inset 0 0 60px rgba(0,0,0,0.25);
  border-radius:16px;overflow:hidden;
  transform-origin:center center;
  border:2px solid var(--bdr);
}
canvas{position:absolute;top:0;left:0;touch-action:none;}
.hidden{display:none!important;}
.ts-overlay{
  position:absolute;top:0;left:0;width:1280px;height:720px;
  display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:20;
}
/* TITLE */
#title-screen{background:radial-gradient(ellipse at 50% 30%,#0a2a4a 0%,#030e22 60%,#010810 100%);}
#title-screen::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(56,178,248,0.025) 40px,rgba(56,178,248,0.025) 41px),
             repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(56,178,248,0.025) 40px,rgba(56,178,248,0.025) 41px);
  pointer-events:none;
}
.title-box{
  background:rgba(0,0,0,0.5);border:2px solid var(--bdr);
  padding:40px 64px;border-radius:20px;
  display:flex;flex-direction:column;align-items:center;
  box-shadow:0 0 60px rgba(56,178,248,0.12),inset 0 0 40px rgba(0,0,0,0.3);
}
.title-h1{font-size:4.4rem;color:var(--accent);font-weight:800;letter-spacing:8px;
  text-shadow:0 0 40px rgba(56,178,248,0.7),0 0 80px rgba(56,178,248,0.3);margin-bottom:4px;}
.title-sub{color:var(--text-main);font-size:1.4rem;letter-spacing:10px;margin-bottom:32px;opacity:0.75;}
.btn{
  background:linear-gradient(to bottom,#0e3a70,#071e40);
  color:var(--text-hi);border:1px solid #2a6aaa;
  padding:13px 24px;border-radius:10px;cursor:pointer;
  font-size:1.1rem;margin:5px;font-weight:800;font-family:inherit;
  box-shadow:0 4px 0 #020e22,0 6px 14px rgba(0,0,0,0.5);
  transition:transform 0.1s;width:290px;-webkit-tap-highlight-color:transparent;
}
.btn:hover{transform:translateY(2px);box-shadow:0 2px 0 #020e22;}
.btn:active{transform:translateY(4px);box-shadow:none;}
.btn-green{background:linear-gradient(to bottom,#1a7a40,#0e4424);border-color:#2eaa60;box-shadow:0 4px 0 #040e08,0 6px 14px rgba(0,0,0,0.5);}
.btn-green:hover{box-shadow:0 2px 0 #040e08;}
.btn-red{background:linear-gradient(to bottom,#6a1820,#3e0e14);border-color:#8a3040;box-shadow:0 4px 0 #180408;}
.btn-red:hover{box-shadow:0 2px 0 #180408;}
.btn-gray{background:linear-gradient(to bottom,#1e2c3c,#101820);border-color:#2e4458;box-shadow:0 4px 0 #04080e;}
.btn-gray:hover{box-shadow:0 2px 0 #04080e;}
.btn-player{
  background:linear-gradient(to bottom,#0e4060,#062030);color:var(--text-hi);border:1px solid #1a6080;
  padding:13px 24px;border-radius:10px;cursor:pointer;font-size:1.05rem;margin:5px;
  font-weight:800;font-family:inherit;width:290px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:transform 0.1s;box-shadow:0 4px 0 #020c18,0 6px 14px rgba(0,0,0,0.5);
  -webkit-tap-highlight-color:transparent;
}
.btn-player:hover{transform:translateY(2px);box-shadow:0 2px 0 #020c18;}
.btn-player:active{transform:translateY(4px);box-shadow:none;}
.ts-diff-btn{width:148px;padding:20px 0;font-size:1.15rem;margin:0;}
.difficulty-container{display:flex;flex-direction:row;justify-content:center;align-items:flex-end;gap:20px;margin-bottom:16px;}
.diff-wrapper{display:flex;flex-direction:column;align-items:center;}
.ts-modal-bg{
  position:absolute;top:0;left:0;width:1280px;height:720px;
  background:rgba(0,0,0,0.65);z-index:30;display:flex;justify-content:center;align-items:center;
}
.ts-modal-box{
  background:#051528;color:var(--text-hi);padding:28px 32px;border-radius:24px;
  width:88%;max-width:820px;max-height:85vh;overflow-y:auto;
  border:2px solid var(--bdr);box-shadow:0 10px 40px rgba(0,0,0,0.5);
  font-family:'M PLUS Rounded 1c',sans-serif;
}
.ts-modal-box h2{font-size:1.4rem;color:var(--accent);margin-bottom:16px;text-align:center;border-bottom:2px dotted var(--bdr-dim);padding-bottom:10px;}
.add-player-form{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
.input-name{padding:10px;font-size:1rem;border-radius:10px;border:2px solid var(--bdr);background:#020d1e;color:var(--text-hi);width:200px;font-family:'M PLUS Rounded 1c',sans-serif;}
.player-list{list-style:none;padding:0;margin:12px 0;display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;}
.player-item{background:#061d3a;padding:10px 18px;border-radius:14px;display:flex;justify-content:space-between;align-items:center;border:2px solid transparent;cursor:pointer;transition:all 0.15s;}
.player-item:hover{border-color:var(--bdr);transform:translateY(-2px);}
.player-item.selected{border-color:var(--green);background:#0a2a1a;}
.player-name{font-size:1.15rem;font-weight:800;flex:1;text-align:left;color:var(--text-hi);}
.delete-btn{background:#7a1a1a;color:#fff;border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-weight:bold;line-height:30px;padding:0;font-size:1rem;}
</style>

<body>
<div id="container">
  <canvas id="cvs" width="1280" height="720"></canvas>

  <!-- TITLE SCREEN -->
  <div id="title-screen" class="ts-overlay">
    <div style="text-align:center;margin-bottom:20px;">
      <h1 class="title-h1">TriSquare</h1>
      <p class="title-sub">トライスクエア</p>
    </div>
    <div class="title-box">
      <div id="title-main-menu" style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <button id="btn-start-menu" class="btn btn-green" style="font-size:1.2rem;margin-bottom:10px;">はじめる</button>
        <button id="player-select-btn" class="btn-player">
          <span style="font-size:1.5rem;">👤</span>
          <span id="current-player-name-display">ゲスト</span>
          <span style="font-size:0.8rem;opacity:0.7;">(へんこう)</span>
        </button>
        <button id="btn-view-ranking" class="btn" style="background:linear-gradient(to bottom,#4a1a60,#28103a);border-color:#7a3aaa;">🏆 ランキング（準備中）</button>
        <button class="btn btn-gray" onclick="location.href='../index.html'">🏠 INDEXへ</button>
      </div>
      <div id="difficulty-menu" class="hidden" style="display:flex;flex-direction:column;align-items:center;">
        <p style="color:var(--text-main);margin-bottom:18px;font-size:1rem;">グリッドサイズをえらんでください</p>
        <div class="difficulty-container">
          <div class="diff-wrapper">
            <button id="btn-easy" class="btn btn-green ts-diff-btn">やさしい<br><span style="font-size:0.78rem;opacity:0.85;">3 × 3</span></button>
          </div>
          <div class="diff-wrapper">
            <button id="btn-normal" class="btn ts-diff-btn">ふつう<br><span style="font-size:0.78rem;opacity:0.85;">4 × 4</span></button>
          </div>
          <div class="diff-wrapper">
            <button id="btn-hard" class="btn btn-red ts-diff-btn">むずかしい<br><span style="font-size:0.78rem;opacity:0.85;">5 × 5</span></button>
          </div>
        </div>
        <button id="btn-back-to-menu" class="btn btn-gray" style="width:200px;margin-top:6px;">もどる</button>
      </div>
    </div>
  </div>

  <!-- PLAYER MANAGER -->
  <div id="player-manager" class="ts-modal-bg hidden">
    <div class="ts-modal-box">
      <h2>👤 プレーヤーをえらぶ</h2>
      <p style="font-size:0.9rem;color:var(--text-dim);text-align:center;margin-bottom:12px;">なまえをにゅうりょくしてね（12もじまで）</p>
      <div class="add-player-form">
        <input type="text" id="input-new-player" class="input-name" placeholder="なまえ" maxlength="12">
        <button id="btn-add-player" class="btn btn-green" style="width:auto;border-radius:10px;padding:8px 16px;">ついか</button>
      </div>
      <ul id="player-list-ul" class="player-list"></ul>
      <div style="text-align:center;margin-top:8px;">
        <button id="btn-close-player-manager" class="btn btn-gray" style="width:160px;">とじる</button>
      </div>
    </div>
  </div>

  <!-- RANKING (coming soon) -->
  <div id="ranking-screen" class="ts-modal-bg hidden">
    <div class="ts-modal-box" style="text-align:center;">
      <h2>🏆 ランキング</h2>
      <p style="font-size:3rem;margin:24px 0 16px;">🚧</p>
      <p style="font-size:1.1rem;color:var(--text-main);">ランキング機能は近日公開予定です。</p>
      <p style="margin-top:8px;font-size:0.9rem;color:var(--text-dim);">Coming Soon...</p>
      <div style="margin-top:24px;">
        <button id="btn-close-ranking" class="btn btn-gray" style="width:160px;">とじる</button>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';
// ============================================================
//  CANVAS / LAYOUT
// ============================================================
const W=1280, H=720;

// Left: grid area  Right: info + hand panel
const GRID_W=658;   // left portion width
const PX=670;       // right panel x
const PW=602;       // right panel width (1280-670-8=602)

// Triangle slot types (per cell): t=0=UL(\上), t=1=LR(\下) のみ使用
// 回転/フリップはセル位置のみ変換（t値は0/1のまま — 分類にないブロックが出ない）

// Colors
const C_BG  ='#020d1e';
const C_CELL='#061d3a';
const C_LINE='rgba(56,178,248,0.12)';
const C_DIAG='rgba(56,178,248,0.06)';
const C_OK  ='rgba(63,214,138,0.36)';
const C_BAD ='rgba(220,60,60,0.30)';
// 分類ごとの色 (cat1〜9)
const CAT_COL=['#f87838','#38b2f8','#f8d830','#c038f8','#38d880','#f83870','#30d8f0','#90d840','#e06030'];
// Lvカラー (Lv1=灰青, Lv2〜10=各色, Lv11+はLv10と同色)
const LV_COL=['#8899cc','#3fd68a','#38b2f8','#ffe040','#ff8020','#ff4060','#ff40c0','#c840ff','#40ffe0','#ffa030'];
const lvColor=lv=>LV_COL[Math.min(lv-1,LV_COL.length-1)];

// ── ボーナス1/4三角の幾何学対応テーブル ──────────────────────────────
// ハーフ三角スロット t=0〜3 が覆う 1/4 三角:
//   t=0(UL\左上) → dir=0(Top), dir=3(Left) を覆う
//   t=1(LR\右下) → dir=1(Right), dir=2(Bottom) を覆う
//   t=2(UR/右上) → dir=0(Top), dir=1(Right) を覆う
//   t=3(LL/左下) → dir=2(Bottom), dir=3(Left) を覆う
// DIR_COVERED[dir] = そのdirを覆うtスロットの配列
const DIR_COVERED=[[0,2],[1,2],[1,3],[0,3]]; // dir0=Top,dir1=Right,dir2=Bottom,dir3=Left

// ============================================================
//  PIECE DEFINITIONS  (cat=分類, pts=点数)
// ============================================================
const sq=(r,c)=>[{r,c,t:0},{r,c,t:1}];
const tr=(r,c,t)=>[{r,c,t}];

// 辺接続ルール: t=1(r,c)↔t=0(r+1,c)[下辺], t=1(r,c)↔t=0(r,c+1)[右辺], t=0↔t=1[対角/同セル]
// t=0=UL(左上△), t=1=LR(右下△) — グリッドで使うスロットはこの2種のみ
const PIECE_DEFS=[
  // 分類1 (10pt): △1個 — 回転でt=0↔t=1(2通り配置可)
  {id:0,  cat:1, pts:10,  els:[...tr(0,0,0)]},
  // 分類2 (20pt): □1個
  {id:1,  cat:2, pts:20, els:[...sq(0,0)]},
  // 分類3 (40pt): △2連 辺接続
  {id:2,  cat:3, pts:40, els:[...tr(0,0,1),...tr(1,0,0)]},   // LR(0,0)+UL(1,0) 下辺接続
  {id:3,  cat:3, pts:40, els:[...tr(0,0,1),...tr(0,1,0)]},   // LR(0,0)+UL(0,1) 右辺接続
  // 分類4 (60pt): □+△ 辺接続
  {id:4,  cat:4, pts:60, els:[...sq(0,0),...tr(0,1,0)]},     // □+UL右 (LR右辺↔UL左辺)
  {id:5,  cat:4, pts:60, els:[...sq(0,0),...tr(1,0,0)]},     // □+UL下 (LR下辺↔UL上辺)
  {id:6,  cat:4, pts:60, els:[...tr(0,0,1),...sq(1,0)]},     // LR上+□下 (LR下辺↔UL上辺)
  // 分類5 (80pt): □□
  {id:7,  cat:5, pts:80, els:[...sq(0,0),...sq(0,1)]},       // □□横
  {id:8,  cat:5, pts:80, els:[...sq(0,0),...sq(1,0)]},       // □□縦
  // 分類6 (90pt): △3 T字 — 数学的に唯一の辺接続3△形
  {id:9,  cat:6, pts:90, els:[...tr(0,0,1),...tr(0,1,0),...tr(1,0,0)]}, // LR中心+UL右+UL下
  // 分類7 (120pt): 5△複合 辺接続確認済
  {id:10, cat:7, pts:120, els:[...sq(0,0),...sq(1,0),...tr(0,1,0)]},            // □□縦+△右上
  {id:11, cat:7, pts:120, els:[...sq(0,0),...tr(0,1,0),...tr(1,0,0)]},          // □+2△
  {id:12, cat:7, pts:120, els:[...sq(0,0),...sq(0,1),...tr(1,1,0)]},            // □□横+△右下
  {id:13, cat:7, pts:120, els:[...tr(0,0,1),...sq(0,1),...tr(1,1,0)]},          // Z字5△
  {id:14, cat:7, pts:120, els:[...sq(0,0),...sq(1,0),...tr(1,1,0)]},            // □□縦+△右下
  // 分類8 (150pt): □□+△ 辺接続確認済
  {id:15, cat:8, pts:150, els:[...sq(0,0),...sq(0,1),...tr(0,2,0)]},            // □□+△端
  {id:16, cat:8, pts:150, els:[...sq(0,0),...sq(0,1),...tr(1,0,0)]},            // □□+△左下
  // 分類9 (180pt): □□□/L字
  {id:17, cat:9, pts:180, els:[...sq(0,0),...sq(0,1),...sq(0,2)]},              // □□□横
  {id:18, cat:9, pts:180, els:[...sq(0,0),...sq(0,1),...sq(1,0)]},              // L字
  {id:19, cat:9, pts:180, els:[...sq(0,0),...sq(0,1),...sq(1,1)]},              // J字
  {id:20, cat:9, pts:180, els:[...sq(0,0),...sq(1,0),...sq(1,1)]},              // L字縦
];

// Lvを考慮した実効得点 (線形加算: Lv1=base, Lv2=base×1.5, Lv3=base×2.0 ...)
function getPts(defId){
  const base=PIECE_DEFS[defId].pts;
  const lv=G.pieceLevels[defId];
  return base + (base>>1)*(lv-1);  // base/2 は常に整数(全ptsが偶数のため)
}
// 形状正規化: 全8方向(4回転×2反転)の中で辞書順最小のキーを正規形とする
// これにより「同じ形の回転・反転版」を同一扱いできる
function pieceShape(defId){
  const base=PIECE_DEFS[defId].els;
  let best=null;
  for(let rot=0;rot<4;rot++){
    for(const flip of [false,true]){
      const key=xform(base,rot,flip).map(e=>`${e.r},${e.c},${e.t}`).sort().join('|');
      if(!best||key<best) best=key;
    }
  }
  return best;
}
// ※ PIECE_SHAPE の計算は TRANSFORMS セクション後(getPEls 直後)で行う

// 分類別確率テーブル (cat1〜9, 合計=100%)
const DIFF_PROB={
  easy:  [20,15,15,15,15, 5, 5, 5, 5],
  normal:[20,12,12,12,12, 8, 8, 8, 8],
  hard:  [20,10,10,10,10,10,10,10,10],
};

// ============================================================
//  TRANSFORMS
// ============================================================
// 90°CW(スクリーン座標): UL(0)→UR(2)→LR(1)→LL(3)→UL(0)
const ROT_T=[2,3,1,0];
// 水平反転: UL(0)↔UR(2), LR(1)↔LL(3)
const FLIP_T=[2,3,0,1];
// 位置変換: r'=c, c'=−r (時計回りCW) + t変換
const rotEl=({r,c,t})=>({r:c, c:-r, t:ROT_T[t]});
const flpEl=({r,c,t})=>({r, c:-c, t:FLIP_T[t]});
function norm(els){
  const mr=Math.min(...els.map(e=>e.r)), mc=Math.min(...els.map(e=>e.c));
  return els.map(({r,c,t})=>({r:r-mr,c:c-mc,t}));
}
function xform(base,rot,flip){
  let e=base.map(x=>({...x}));
  for(let i=0;i<rot;i++) e=e.map(rotEl);
  if(flip) e=e.map(flpEl);
  e=norm(e);
  // 同セルにt=2+t=3が共存 = 回転した正方形 → t=0+t=1に正規化
  const cellT={};
  for(const el of e){const k=`${el.r},${el.c}`;(cellT[k]=cellT[k]||new Set()).add(el.t);}
  return e.map(el=>{
    const ts=cellT[`${el.r},${el.c}`];
    if(ts.has(2)&&ts.has(3)) return{r:el.r,c:el.c,t:el.t===2?0:1};
    return el;
  });
}
const getPEls=p=>xform(PIECE_DEFS[p.defId].els, p.rot, p.flipped);
// flpEl/rotElが初期化済みのこの位置で計算する
const PIECE_SHAPE=PIECE_DEFS.map(d=>pieceShape(d.id));


// ============================================================
//  DYNAMIC GRID  (GN*CELL = 600 for all difficulties)
// ============================================================
let GN=5, CELL=120, GX=29, GY=60;
const GN_CELL={3:200, 4:150, 5:120};

function setLayout(){
  CELL=GN_CELL[GN];
  const sz=GN*CELL;            // always 600
  GX=Math.floor((GRID_W-sz)/2);  // (658-600)/2=29
  GY=Math.floor((H-sz)/2);       // (720-600)/2=60
}

// ============================================================
//  GAME STATE
// ============================================================
let G={
  grid:null,
  gridCat:null,     // 各スロットを埋めた分類番号(1-9), 0=空
  hand:[null,null,null],
  selHand:-1, hoverCell:null,
  score:0,          // このステージのスコア = blockScoreSum × areaRate
  displayScore:0,   // アニメーション表示用
  scoreDelay:0,
  blockScoreSum:0,  // このステージのブロック得点合計
  prevStagesTotal:0,// 前ステージまでの合計スコア
  placed:0,
  bonusCells:[],    // ボーナス三角 [{r,c,t,mp}, {r,c,t,mp}] 最大2つ
  placedSinceDiscard:[0,0,0],
  stage:1,
  difficulty:'normal',
  phase:'title',
  playerName:'ゲスト',
  flash:[],
  pieceLevels:new Array(21).fill(1),  // 各ブロックのLv (ラン持続)
  pendingRewardId:-1,                  // 報酬で選んだブロックのdefId (-1=なし)
  rewardChoices:[],                    // 報酬選択肢3つのdefId
};

// ============================================================
//  GRID HELPERS
// ============================================================
const gIdx=(r,c,t)=>(r*GN+c)*4+t;
const inB=(r,c)=>r>=0&&r<GN&&c>=0&&c<GN;
// セルに三角が1つでもあるか (ボーナス配置・G.placed・ステージクリア判定用)
function cellHasAny(r,c){
  if(!inB(r,c)) return true;
  const b=(r*GN+c)*4;
  return !!(G.grid[b]||G.grid[b+1]||G.grid[b+2]||G.grid[b+3]);
}
// セルが完全に埋まっているか: t=0+t=1 または t=2+t=3 が両方揃う
function cellFull(r,c){
  if(!inB(r,c)) return false;
  const b=(r*GN+c)*4;
  return (G.grid[b+0]&&G.grid[b+1])||(G.grid[b+2]&&G.grid[b+3]);
}
// スロット単位の空き判定: 対角線ペアのみ共存可
//   t=0(UL)↔t=1(LR) は干渉しない (\ 対角線で分割)
//   t=2(UR)↔t=3(LL) は干渉しない (/ 対角線で分割)
//   クロス (t=0/1 ↔ t=2/3) は幾何的に重なるため不可
function slotFree(r,c,t){
  if(!inB(r,c)) return false;
  const b=(r*GN+c)*4;
  if(G.grid[b+t]) return false;           // 同スロット占有
  if(t<=1) return !(G.grid[b+2]||G.grid[b+3]); // t=0/1 ↔ t=2/3 干渉
  return     !(G.grid[b+0]||G.grid[b+1]);       // t=2/3 ↔ t=0/1 干渉
}
// isFilled: スロット単位
const isFilled=(r,c,t)=>!slotFree(r,c,t);
const absEls=(p,ar,ac)=>getPEls(p).map(({r,c,t})=>({r:r+ar,c:c+ac,t}));
function canPlace(p,ar,ac){
  // スロット単位: t=0とt=1は同一セルに共存OK (正方形の片側→残り半分を置ける)
  return absEls(p,ar,ac).every(({r,c,t})=>slotFree(r,c,t));
}

// Check ALL 8 orientations (4 rot × 2 flip) so rotation is accounted for
function anyValid(p){
  for(let rot=0;rot<4;rot++) for(let flip=0;flip<2;flip++){
    const pp={...p,rot,flipped:!!flip};
    for(let r=0;r<GN;r++) for(let c=0;c<GN;c++) if(canPlace(pp,r,c)) return true;
  }
  return false;
}
const maxTri=()=>GN*GN;   // セル数 = 全セル占有でステージクリア

// ゲームオーバー判定: 捨てられない かつ どのブロックも置けない
function checkGameOver(){
  if(G.phase!=='game') return;
  if(G.hand.some((p,i)=>p&&G.placedSinceDiscard[i]>=5)) return;  // いずれかが捨てられる → まだゲームオーバーでない
  if(G.hand.some(p=>p&&anyValid(p))) return;
  G.phase='game_over';
}

function rr(x,y,w,h,r,fill,stroke,lw=1){
  if(w<=0||h<=0) return;
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
}
function tx(s,x,y,sz,col,align='left',bold=false){
  ctx.font=`${bold?'800':'400'} ${sz}px 'Nunito','M PLUS Rounded 1c',sans-serif`;
  ctx.fillStyle=col;ctx.textAlign=align;ctx.textBaseline='middle';
  ctx.fillText(s,x,y);
}
// "Lv.N ➡ Lv.N+1" を各レベル色で描画
function txLvArr(lv,cx,cy,sz){
  const s1='Lv.'+lv, sa='  ➡  ', s2='Lv.'+(lv+1);
  ctx.font=`800 ${sz}px 'Nunito','M PLUS Rounded 1c',sans-serif`;
  const w1=ctx.measureText(s1).width, wa=ctx.measureText(sa).width, w2=ctx.measureText(s2).width;
  const sx=cx-(w1+wa+w2)/2;
  ctx.textBaseline='middle'; ctx.textAlign='left';
  ctx.fillStyle=lvColor(lv);   ctx.fillText(s1,sx,cy);
  ctx.fillStyle='#aabbcc';     ctx.fillText(sa,sx+w1,cy);
  ctx.fillStyle=lvColor(lv+1); ctx.fillText(s2,sx+w1+wa,cy);
}


// ============================================================
//  DRAW TRIANGLE (generic position)
// ============================================================
// ボーナス用センター三角: 両対角線で4分割した1/4正方形
// dir: 0=上辺が底辺, 1=右辺が底辺, 2=下辺が底辺, 3=左辺が底辺  (中心が頂点)
function drawCenterTri(x,y,S,dir,fill,stroke,lw){
  const cx=x+S/2, cy=y+S/2;
  ctx.beginPath();
  switch(dir){
    case 0:ctx.moveTo(x,y);    ctx.lineTo(x+S,y);    ctx.lineTo(cx,cy);break; // 上辺底辺
    case 1:ctx.moveTo(x+S,y);  ctx.lineTo(x+S,y+S);  ctx.lineTo(cx,cy);break; // 右辺底辺
    case 2:ctx.moveTo(x+S,y+S);ctx.lineTo(x,y+S);    ctx.lineTo(cx,cy);break; // 下辺底辺
    case 3:ctx.moveTo(x,y+S);  ctx.lineTo(x,y);      ctx.lineTo(cx,cy);break; // 左辺底辺
  }
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
}
function drawTri(x,y,S,t,fill,stroke,lw=0.5){
  ctx.beginPath();
  switch(t){
    case 0:ctx.moveTo(x,y);  ctx.lineTo(x+S,y);  ctx.lineTo(x,y+S);  break;
    case 1:ctx.moveTo(x+S,y);ctx.lineTo(x+S,y+S);ctx.lineTo(x,y+S);  break;
    case 2:ctx.moveTo(x,y);  ctx.lineTo(x+S,y);  ctx.lineTo(x+S,y+S);break;
    case 3:ctx.moveTo(x,y);  ctx.lineTo(x+S,y+S);ctx.lineTo(x,y+S);  break;
  }
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
}
const gridTri=(r,c,t,fill,stroke,lw)=>drawTri(GX+c*CELL,GY+r*CELL,CELL,t,fill,stroke,lw);

// ============================================================
//  DRAW GRID
// ============================================================
function drawGrid(){
  rr(GX-5,GY-5,GN*CELL+10,GN*CELL+10,10,'#020c1e','#1a4870',2);
  for(let r=0;r<GN;r++) for(let c=0;c<GN;c++){
    const x=GX+c*CELL,y=GY+r*CELL;
    rr(x+1,y+1,CELL-2,CELL-2,2,C_CELL,null);
    ctx.strokeStyle=C_DIAG;ctx.lineWidth=0.6;
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+CELL,y+CELL);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+CELL,y);ctx.lineTo(x,y+CELL);ctx.stroke();
    const base=(r*GN+c)*4;
    for(let t=0;t<4;t++){
      if(G.grid[base+t]){
        // 分類色で塗る
        const catIdx=G.gridCat[base+t]-1;
        const col=catIdx>=0?CAT_COL[catIdx]:'#3fd68a';
        gridTri(r,c,t,col,'rgba(0,0,0,0.18)',0.5);
      }
    }
    ctx.strokeStyle=C_LINE;ctx.lineWidth=1;
    ctx.strokeRect(x+0.5,y+0.5,CELL-1,CELL-1);
  }
  // ── ボーナスセル (2つ、空きのみ・中心三角=両対角線4分割) ──
  const pulse=0.45+0.35*Math.sin(Date.now()/180);
  for(const bc of G.bonusCells){
    // このdirを覆うtスロットのどちらかが既に埋まっていたら非表示
    const [ta,tb]=DIR_COVERED[bc.dir];
    const bb=(bc.r*GN+bc.c)*4;
    if(G.grid[bb+ta]||G.grid[bb+tb]) continue;
    const bcol=MP_COL[bc.mp]||'#ffe040';
    const bx=GX+bc.c*CELL, by=GY+bc.r*CELL;
    const dir=bc.dir||0;
    // 塗りつぶし
    ctx.save(); ctx.globalAlpha=pulse*0.72;
    drawCenterTri(bx,by,CELL,dir,bcol,null,0);
    ctx.restore();
    // 枠線
    ctx.save(); ctx.globalAlpha=pulse;
    drawCenterTri(bx,by,CELL,dir,null,bcol,2);
    ctx.restore();
    // ×n テキスト: 各三角の重心 = ((3頂点)の平均)
    // 重心: dir0=(C/2,C/6) dir1=(5C/6,C/2) dir2=(C/2,5C/6) dir3=(C/6,C/2)
    const cent=[[bx+CELL/2,by+CELL/6],[bx+CELL*5/6,by+CELL/2],
                [bx+CELL/2,by+CELL*5/6],[bx+CELL/6,by+CELL/2]];
    ctx.save(); ctx.globalAlpha=Math.min(1,pulse*1.4);
    tx('×'+bc.mp, cent[dir][0], cent[dir][1], Math.round(CELL*0.20), bcol,'center',true);
    ctx.restore();
  }
  // ── フロートスコア (delay対応) ──
  ctx.save();
  G.flash.forEach(f=>{
    if((f.delay||0)>0) return;
    ctx.globalAlpha=Math.min(1,f.ttl/30);
    tx(f.text,GX+f.c*CELL+CELL/2,GY+f.r*CELL+CELL/2-f.sz*5,20+f.sz,f.col||'#ffe066','center',true);
  });
  ctx.restore();
  // Ghost piece
  if(G.phase==='game'){
    const p=G.selHand>=0?G.hand[G.selHand]:null;
    if(p&&G.hoverCell){
      const{r:ar,c:ac}=G.hoverCell, ok=canPlace(p,ar,ac);
      absEls(p,ar,ac).forEach(({r,c,t})=>{
        if(inB(r,c)) gridTri(r,c,t,ok?C_OK:C_BAD,'rgba(255,255,255,0.15)',0.4);
      });
    }
  }
}

const CY=178;   // card top y
const CH=320;   // card height

let BR={};  // clickable button rects

function drawPieceCard(p,bx,by,bw,bh,sel,dim){
  if(dim) ctx.globalAlpha=0.30;
  const borderCol=sel?'#3fd68a':'#1a4870';
  const borderW=sel?2.5:1.5;
  rr(bx,by,bw,bh,10,sel?'#0a2a1a':'#030e22',borderCol,borderW);

  if(p){
    // Lv（上）+ 基礎点（下）表示
    const def=PIECE_DEFS[p.defId];
    const basePts=getPts(p.defId);
    const lv=G.pieceLevels[p.defId];
    const catIdx=(def?.cat||1)-1;
    const catCol=CAT_COL[catIdx]||'#3a8aaa';
    tx('Lv.'+lv, bx+bw/2, by+17, 14, lvColor(lv),'center',lv>1);
    tx(basePts+' pt', bx+bw/2, by+38, 22, catCol,'center',true);

    const els=getPEls(p);
    const rows=Math.max(...els.map(e=>e.r))+1, cols=Math.max(...els.map(e=>e.c))+1;
    // 上部54px(Lv+pt表示)と下部10px を除いた領域にピース描画
    const topOff=54, botOff=10;
    const drawH=bh-topOff-botOff;
    const sz=Math.min(Math.min((bw-24)/cols,drawH/rows),80);
    const ox=bx+(bw-cols*sz)/2, oy=by+topOff+(drawH-rows*sz)/2;
    const col=catCol;  // 分類色を使用
    for(const {r,c,t} of els){
      const x=ox+c*sz, y=oy+r*sz;
      drawTri(x,y,sz,t,col,'rgba(0,0,0,0.22)',1.2);
      ctx.strokeStyle='rgba(255,255,255,0.09)';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+sz,y+sz);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+sz,y);ctx.lineTo(x,y+sz);ctx.stroke();
    }
  }
  if(dim) ctx.globalAlpha=1;
}

function drawHand(){
  BR={};
  for(let i=0;i<3;i++){
    const bx=cardX(i), sel=G.selHand===i, dim=drag.active&&drag.handIdx===i;
    drawPieceCard(G.hand[i],bx,CY,CARD_W,CH,sel,dim);
    BR[`h${i}`]={x:bx,y:CY,w:CARD_W,h:CH};

    if(G.hand[i]){
      // ── Rotate / Flip buttons (bigger) ──
      const rby=CY+CH+6, rbh=46, rw=(CARD_W-8)/2;
      const rx=bx, fx=bx+rw+8;
      rr(rx,rby,rw,rbh,8,'#0e3a18','#1a6a30',2);
      tx('↻',rx+rw/2,rby+rbh/2,26,'#3fd68a','center',true);
      rr(fx,rby,rw,rbh,8,'#3a1a0a','#7a3a0a',2);
      tx('↔',fx+rw/2,rby+rbh/2,26,'#f8a238','center',true);
      BR[`r${i}`]={x:rx,y:rby,w:rw,h:rbh};
      BR[`f${i}`]={x:fx,y:rby,w:rw,h:rbh};

      // ── Discard (trash) button: プログレスバー ──
      const dby=rby+rbh+6, dbh=44;
      const active=G.placedSinceDiscard[i]>=5&&!dim;
      const completedT=G.placedSinceDiscard[i]; // 0~5 (スロット別カウント)
      // バー背景 (灰色)
      rr(bx,dby,CARD_W,dbh,8,'#111122',active?'#cc4444':'#2a2a40',active?2:1);
      // バー塗り (5分の1ずつ)
      if(completedT>0){
        const fillW=Math.floor(CARD_W*completedT/5);
        ctx.save();
        ctx.beginPath();ctx.roundRect(bx,dby,CARD_W,dbh,8);ctx.clip();
        // グラデーション
        const bg=ctx.createLinearGradient(bx,dby,bx+fillW,dby);
        if(active){ bg.addColorStop(0,'#993333'); bg.addColorStop(1,'#dd4444'); }
        else       { bg.addColorStop(0,'#552222'); bg.addColorStop(1,'#884444'); }
        ctx.fillStyle=bg; ctx.fillRect(bx,dby,fillW,dbh);
        // セグメント区切り線
        for(let s=1;s<5;s++){
          const sx=bx+Math.floor(CARD_W*s/5);
          ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;
          ctx.beginPath();ctx.moveTo(sx,dby);ctx.lineTo(sx,dby+dbh);ctx.stroke();
        }
        ctx.restore();
      }
      // 🗑️ emoji + カウント
      ctx.save();
      ctx.globalAlpha=active?1:0.25+completedT*0.13;
      ctx.font='18px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🗑️',bx+CARD_W/2,dby+dbh/2);
      ctx.restore();

      BR[`d${i}`]={x:bx,y:dby,w:CARD_W,h:dbh,active};
    }
  }

  // ── Sub-buttons row (ステータスメッセージなし) ──
  const subY=CY+CH+6+46+6+44+8;
  const hw=Math.floor((PW-20)/2);
  BR.howto={x:PX+4,y:subY,w:hw,h:42};
  rr(PX+4,subY,hw,42,8,'#020d1e','#1a4870',1.5);
  tx('あそびかた',PX+4+hw/2,subY+21,16,'#7aaec8','center');
  BR.back={x:PX+4+hw+12,y:subY,w:hw,h:42};
  rr(PX+4+hw+12,subY,hw,42,8,'#020d1e','#1a4870',1.5);
  tx('タイトルへ',PX+4+hw+12+hw/2,subY+21,16,'#7aaec8','center');

  // ── Drag floating piece ──
  if(drag.active){
    const p=G.hand[drag.handIdx];
    if(p){
      const els=getPEls(p),sz=52,col=CAT_COL[(PIECE_DEFS[p.defId]?.cat||1)-1];
      ctx.save();ctx.globalAlpha=0.85;
      for(const {r,c,t} of els)
        drawTri(drag.curX-sz+c*sz, drag.curY-sz+r*sz, sz, t, col,'rgba(255,255,255,0.5)',1.5);
      ctx.restore();
    }
  }
}

function startReward(){
  // シャッフル後、同じ形(回転・反転を含む)は除外して3種選ぶ
  const pool=Array.from({length:PIECE_DEFS.length},(_,i)=>i);
  for(let i=pool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  const choices=[], usedShapes=new Set();
  for(const defId of pool){
    if(choices.length>=3) break;
    const shape=PIECE_SHAPE[defId];
    if(!usedShapes.has(shape)){ usedShapes.add(shape); choices.push(defId); }
  }
  G.rewardChoices=choices;
}

    const def=PIECE_DEFS[defId];
    const lv=G.pieceLevels[defId];
    const curPts=getPts(defId);
    const nextPts=def.pts+(def.pts>>1)*lv;
    const catCol=CAT_COL[(def.cat-1)]||'#3a8aaa';
    const cx=csx+i*(cw+gap), cy=csy;

    rr(cx,cy,cw,ch,14,'#040f24',catCol,2.5);
    // Lv遷移 (大きく・各Lv色付き)
    txLvArr(lv, cx+cw/2, cy+30, 21);

    // ピース描画
    const p0={defId,rot:0,flipped:false};
    const els=getPEls(p0);
    const rows=Math.max(...els.map(e=>e.r))+1, cols=Math.max(...els.map(e=>e.c))+1;
    const drawH=ch-98;
    const sz=Math.min((cw-28)/cols,drawH/rows,72);
    const ox=cx+(cw-cols*sz)/2, oy=cy+56+(drawH-rows*sz)/2;
    for(const {r,c,t} of els){
      const x=ox+c*sz, y=oy+r*sz;
      drawTri(x,y,sz,t,catCol,'rgba(0,0,0,0.22)',1.2);
      ctx.strokeStyle='rgba(255,255,255,0.09)'; ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+sz,y+sz);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+sz,y);ctx.lineTo(x,y+sz);ctx.stroke();
    }
    // pt遷移 (大きく)
    tx(curPts+'pt  ➡  '+nextPts+'pt', cx+cw/2, cy+ch-22, 20, catCol,'center',true);
    BR['rw'+i]={x:cx,y:cy,w:cw,h:ch};
  }
}
function drawHowToScreen(){
  ctx.fillStyle='rgba(0,0,0,0.80)';ctx.fillRect(0,0,W,H);
  rr(W/2-360,H/2-290,720,580,16,'#030e22','#38b2f8',3);
  tx('あそびかた',W/2,H/2-255,26,'#38b2f8','center',true);
  const lines=[
    '① てふだの ブロックを グリッドに ドラッグして おこう',
    '   タップで えらんで → グリッドを タップ でもOK',
    '② ブロックを おくと すぐ 新しい ブロックが くる',
    '③  ↻ボタン: 右回りに かいてん  ↔ボタン: 左右はんてん',
    '④ 5ターン おくと 🗑️ が ひかる → てふだを すてられる',
    '   すてたら また 5ターン おかないと すてられない',
    '⑤ ３枚が どこにも おけず すてられないと ゲームおわり',
    '⑥ スコア＝ブロック得点合計 × 面積占有率',
    '   ブロック得点 ＝ 基礎点 × MP（ボーナス倍率）',
  ];
  lines.forEach((l,i)=>tx(l,W/2-320,H/2-210+i*52,14,i%2===0?'#cce8ff':'#7aaec8','left'));
  BR.htclose={x:W/2-70,y:H/2+260,w:140,h:44};
  rr(W/2-70,H/2+260,140,44,10,'#1e2c3c','#38b2f8',2);
  tx('とじる',W/2,H/2+282,17,'#fff','center',true);
}

// ============================================================
//  MAIN DRAW
// ============================================================
function drawGame(){
  ctx.fillStyle=C_BG;ctx.fillRect(0,0,W,H);
  drawGrid();
  drawInfo();
  drawHand();
  if(G.phase==='game_over')      drawGameOver();
  else if(G.phase==='stage_clear') drawStageClear();
  if(howTo) drawHowToScreen();
  G.flash=G.flash.filter(f=>{
    if((f.delay||0)>0){f.delay--;return true;}
    f.ttl--;f.sz+=0.4;return f.ttl>0;
  });
}

// ============================================================
//  PIECE GENERATION  (分類別確率)
// ============================================================
function mkPiece(){
  const probs=DIFF_PROB[G.difficulty]||DIFF_PROB.normal;
  const total=probs.reduce((a,b)=>a+b,0);
  let rv=Math.random()*total, cum=0, cat=1;
  for(let i=0;i<probs.length;i++){cum+=probs[i];if(rv<cum){cat=i+1;break;}}
  const pool=PIECE_DEFS.filter(d=>d.cat===cat);
  if(!pool.length) return mkPiece();
  const def=pool[Math.floor(Math.random()*pool.length)];
  return{defId:def.id,rot:Math.floor(Math.random()*4),flipped:Math.random()<0.5};
}

// ============================================================
//  GAME START / NEXT STAGE
// ============================================================
// 空き1/4三角スロットから2つ抽選
// 「どの方向(dir)のボーナスを置けるか」をDIR_COVEREDで正確に判定
function pickBonusCell(){
  // 全セルの全方向について「そのdirがまだ空いているか」をリストアップ
  const available=[];
  for(let r=0;r<GN;r++) for(let c=0;c<GN;c++){
    const b=(r*GN+c)*4;
    for(let dir=0;dir<4;dir++){
      const [ta,tb]=DIR_COVERED[dir];
      // このdirを覆う2つのtスロットが両方とも未占有なら空き
      if(!G.grid[b+ta]&&!G.grid[b+tb]) available.push({r,c,dir});
    }
  }
  G.bonusCells=[];
  for(let k=0;k<2&&available.length;k++){
    const idx=Math.floor(Math.random()*available.length);
    const {r,c,dir}=available.splice(idx,1)[0];
    const rv=Math.random();
    const mp=rv<0.60?2:rv<0.85?3:rv<0.95?4:5;
    G.bonusCells.push({r,c,mp,dir});
  }
}
function _initGrid(){
  GN={easy:3,normal:4,hard:5}[G.difficulty]||5;
  setLayout();
  G.grid=new Uint8Array(GN*GN*4);
  G.gridCat=new Uint8Array(GN*GN*4);
  // 報酬ブロックが選ばれていれば左スロットに確定配置
  const rewardPiece=G.pendingRewardId>=0
    ? {defId:G.pendingRewardId, rot:Math.floor(Math.random()*4), flipped:Math.random()<0.5}
    : mkPiece();
  G.pendingRewardId=-1;
  G.hand=[rewardPiece, mkPiece(), mkPiece()];
  G.selHand=-1; G.hoverCell=null;
  G.placed=0; G.placedSinceDiscard=[0,0,0];
  G.blockScoreSum=0; G.score=0; G.displayScore=0; G.scoreDelay=0;
  G.bonusCells=[]; G.flash=[]; G.phase='game';
  howTo=false; drag.active=false;
  pickBonusCell();
}
function startGame(){
  G.stage=1; G.prevStagesTotal=0;
  G.pieceLevels=new Array(PIECE_DEFS.length).fill(1);
  G.pendingRewardId=-1;
  _initGrid();
  document.getElementById('title-screen').classList.add('hidden');
}
function nextStage(){
  G.prevStagesTotal+=G.score;  // このステージのスコアを累積
  G.stage++;
  _initGrid();
}

// ============================================================
//  PLACE PIECE  (score=分類の点数)
// ============================================================
// MPカラーテーブル (グローバル参照)
const MP_COL={2:'#ffe040',3:'#ff8020',4:'#ff4060',5:'#c840ff'};

function place(hi,ar,ac){
  const p=G.hand[hi];
  if(!p||!canPlace(p,ar,ac)) return;
  const els=absEls(p,ar,ac);
  const cat=PIECE_DEFS[p.defId]?.cat||1;
  // 初めて三角が入るセル (G.placed カウント用)
  const newCells=new Set();
  for(const {r,c} of els){
    const k=r*GN+c;
    if(!cellHasAny(r,c)&&!newCells.has(k)) newCells.add(k);
  }
  // ボーナス判定: 置いた三角(t)がボーナスdir の1/4を覆う場合にのみ取得
  let mpHit=1, mpMaxSingle=1;
  for(const bc of G.bonusCells){
    const [ta,tb]=DIR_COVERED[bc.dir];
    // elsの中に (r=bc.r, c=bc.c, t=ta or tb) の要素があれば取得
    if(els.some(({r,c,t})=>r===bc.r&&c===bc.c&&(t===ta||t===tb))){
      mpHit*=bc.mp;
      mpMaxSingle=Math.max(mpMaxSingle,bc.mp);
    }
  }
  const mpCol=MP_COL[Math.min(5,mpMaxSingle)]||'#ffe040';
  // グリッドに格納
  for(const {r,c,t} of els){
    const idx=gIdx(r,c,t);
    G.grid[idx]=1; G.gridCat[idx]=cat;
  }
  G.placed+=newCells.size;  // セル単位でカウント
  // ── スコア計算: basePts(Lv反映済) × MP ──
  const basePts=getPts(p.defId);
  const mp=mpHit;
  const blockScore=basePts*mp;
  G.blockScoreSum+=blockScore;
  const areaRate=G.placed/maxTri();
  G.score=Math.floor(G.blockScoreSum*areaRate);
  G.scoreDelay=72;

  // ── フロートテキスト (時間差表示) ──
  // ① 基礎点 → すぐ
  G.flash.push({r:ar,c:ac,text:basePts+'pt',ttl:90,sz:0,col:'#aaddff',delay:0});
  if(mp>1){
    // ② ×MP → 20フレーム後
    G.flash.push({r:ar,c:ac,text:'×'+mp,ttl:70,sz:0,col:mpCol,delay:20});
    // ③ 合計pt → 42フレーム後 (色変え)
    G.flash.push({r:ar,c:ac,text:'= '+blockScore+'pt',ttl:55,sz:0,col:'#ffe066',delay:42});
  }

  G.placedSinceDiscard=G.placedSinceDiscard.map(c=>Math.min(c+1,5));
  G.hand[hi]=mkPiece();
  G.selHand=-1;
  // ステージクリア: 全セルが完全に埋まっている (t=0+t=1 または t=2+t=3)
  let allFull=true;
  for(let r=0;r<GN&&allFull;r++) for(let c=0;c<GN&&allFull;c++) if(!cellFull(r,c)) allFull=false;
  if(allFull){ startReward(); G.phase='stage_clear'; return; }
  pickBonusCell();
  checkGameOver();
}

// ============================================================
//  DISCARD PIECE
// ============================================================
function discard(hi){
  if(!G.hand[hi]||G.placedSinceDiscard[hi]<5) return;
  G.hand[hi]=mkPiece();
  G.placedSinceDiscard[hi]=0;  // そのスロットだけリセット: また5ターン待つ
  G.selHand=-1;
  checkGameOver(); // 新しいピースでも置けない場合ゲームオーバー
}

// ============================================================
//  INPUT  (pointer events)
// ============================================================
function toXY(e){
  const r=cvs.getBoundingClientRect();
  return {mx:(e.clientX-r.left)*W/r.width, my:(e.clientY-r.top)*H/r.height};
}
function toCell(mx,my){
  const c=Math.floor((mx-GX)/CELL), r=Math.floor((my-GY)/CELL);
  return (r>=0&&r<GN&&c>=0&&c<GN)?{r,c}:null;
}
const hit=(b,mx,my)=>b&&mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h;

const drag={active:false,handIdx:0,curX:0,curY:0,startX:0,startY:0,pid:null};

cvs.addEventListener('pointermove',e=>{
  e.preventDefault();
  const{mx,my}=toXY(e);
  if(drag.active&&e.pointerId===drag.pid){
    drag.curX=mx; drag.curY=my; G.hoverCell=toCell(mx,my);
  } else if(G.phase==='game'){
    G.hoverCell=toCell(mx,my);
  }
},{passive:false});

cvs.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const{mx,my}=toXY(e);
  // How-to overlay
  if(howTo){if(hit(BR.htclose,mx,my)) howTo=false; return;}
  // Stage clear overlay — 3択カードを直接タップで選択
  if(G.phase==='stage_clear'){
    for(let i=0;i<3;i++){
      if(hit(BR['rw'+i],mx,my)){
        G.pieceLevels[G.rewardChoices[i]]++;
        G.pendingRewardId=G.rewardChoices[i];
        nextStage();
        return;
      }
    }
    return;
  }
  // Game over overlay
  if(G.phase==='game_over'){
    if(hit(BR.retry, mx,my)) startGame();
    else if(hit(BR.title2,mx,my)) showTitle();
    else if(hit(BR.rank2, mx,my)) showRanking();
    return;
  }
  if(G.phase!=='game') return;

  // Start drag from hand card
  for(let i=0;i<3;i++){
    if(G.hand[i]&&hit(BR[`h${i}`],mx,my)){
      G.selHand=i;
      drag.active=true; drag.handIdx=i;
      drag.curX=mx; drag.curY=my;
      drag.startX=mx; drag.startY=my;
      drag.pid=e.pointerId;
      cvs.setPointerCapture(e.pointerId);
      return;
    }
  }
  // Rotate / flip ボタン
  for(let i=0;i<3;i++){
    if(G.hand[i]&&hit(BR[`r${i}`],mx,my)){
      const p=G.hand[i];
      p.rot=(p.rot+(p.flipped?3:1))%4; return;
    }
    if(G.hand[i]&&hit(BR[`f${i}`],mx,my)){
      G.hand[i].flipped=!G.hand[i].flipped; return;
    }
  }
  // Discard
  for(let i=0;i<3;i++){
    const db=BR[`d${i}`];
    if(db&&db.active&&hit(db,mx,my)){discard(i); return;}
  }
  // Sub-buttons
  if(hit(BR.howto,mx,my)){howTo=!howTo; return;}
  if(hit(BR.back, mx,my)){showTitle(); return;}
  // Grid tap → place selected piece
  const cell=toCell(mx,my);
  if(cell&&G.selHand>=0){place(G.selHand,cell.r,cell.c); return;}
},{passive:false});

cvs.addEventListener('pointerup',e=>{
  e.preventDefault();
  if(drag.active&&e.pointerId===drag.pid){
    const dx=drag.curX-drag.startX, dy=drag.curY-drag.startY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<12){
      // タップ: 選択のみ（回転は↺ボタンで）
      if(G.phase==='game') G.selHand=drag.handIdx;
    } else {
      // ドラッグ→ドロップ: place
      const cell=toCell(drag.curX,drag.curY);
      if(cell&&G.phase==='game') place(drag.handIdx,cell.r,cell.c);
    }
    drag.active=false; G.hoverCell=null;
    try{cvs.releasePointerCapture(e.pointerId);}catch(_){}
  }
},{passive:false});
cvs.addEventListener('pointercancel',()=>{drag.active=false; G.hoverCell=null;});

// ============================================================
//  SCREEN NAVIGATION
// ============================================================
function showTitle(){
  G.phase='title'; howTo=false; drag.active=false;
  document.getElementById('title-screen').classList.remove('hidden');
  document.getElementById('title-main-menu').style.display='flex';
  document.getElementById('difficulty-menu').classList.add('hidden');
  updPlayer();
}
function showRanking(){document.getElementById('ranking-screen').classList.remove('hidden');}
function updPlayer(){document.getElementById('current-player-name-display').textContent=G.playerName;}

document.getElementById('btn-start-menu').addEventListener('click',()=>{
  document.getElementById('title-main-menu').style.display='none';
  const dm=document.getElementById('difficulty-menu');
  dm.classList.remove('hidden'); dm.style.display='flex';
});
document.getElementById('btn-back-to-menu').addEventListener('click',()=>{
  document.getElementById('difficulty-menu').classList.add('hidden');
  document.getElementById('title-main-menu').style.display='flex';
});
['easy','normal','hard'].forEach(d=>{
  document.getElementById('btn-'+d).addEventListener('click',()=>{G.difficulty=d; startGame();});
});
document.getElementById('btn-view-ranking').addEventListener('click',showRanking);
document.getElementById('btn-close-ranking').addEventListener('click',()=>document.getElementById('ranking-screen').classList.add('hidden'));
document.getElementById('player-select-btn').addEventListener('click',openPM);
document.getElementById('btn-close-player-manager').addEventListener('click',()=>document.getElementById('player-manager').classList.add('hidden'));
document.getElementById('btn-add-player').addEventListener('click',addP);
document.getElementById('input-new-player').addEventListener('keydown',e=>{if(e.key==='Enter')addP();});

// Player manager
function getPs(){return JSON.parse(localStorage.getItem('ts_players')||'[]');}
function savePs(a){localStorage.setItem('ts_players',JSON.stringify(a));}
function selP(n){G.playerName=n; localStorage.setItem('ts_current_player',n); updPlayer();}
function openPM(){document.getElementById('player-manager').classList.remove('hidden'); renderPL();}
function addP(){
  const inp=document.getElementById('input-new-player');
  const n=inp.value.trim(); if(!n)return;
  const ps=getPs(); if(!ps.includes(n))ps.push(n);
  savePs(ps); selP(n); inp.value=''; renderPL();
}
function renderPL(){
  const ul=document.getElementById('player-list-ul');
  const ps=getPs(); ul.innerHTML='';
  if(!ps.length){ul.innerHTML='<li style="color:#3a6080;text-align:center;padding:12px;">まだ登録されていません</li>';return;}
  ps.forEach(n=>{
    const li=document.createElement('li'); li.className='player-item';
    if(n===G.playerName) li.classList.add('selected');
    const nm=document.createElement('span'); nm.className='player-name'; nm.textContent=n;
    const del=document.createElement('button'); del.className='delete-btn'; del.textContent='×';
    del.addEventListener('click',ev=>{ev.stopPropagation();
      const a=getPs().filter(x=>x!==n); savePs(a);
      if(G.playerName===n){G.playerName=a[0]||'ゲスト'; updPlayer();} renderPL();});
    li.appendChild(nm); li.appendChild(del);
    li.addEventListener('click',()=>{selP(n); renderPL();});
    ul.appendChild(li);
  });
}

// ============================================================
//  FRAME LOOP
// ============================================================
(function loop(){
  requestAnimationFrame(loop);
  // displayScore アニメーション: 1秒ディレイ後にスコアに追いつく
  if(G.scoreDelay>0) G.scoreDelay--;
  else if(G.displayScore<G.score){
    G.displayScore=Math.min(G.score, G.displayScore+Math.max(1,Math.floor((G.score-G.displayScore)*0.10)));
  }
  if(G.phase==='game'||G.phase==='game_over'||G.phase==='stage_clear') drawGame();
})();

(function(){
  const s=localStorage.getItem('ts_current_player');
  if(s) G.playerName=s;
  updPlayer();
})();
</script>
