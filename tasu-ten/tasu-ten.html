            apiKey: "AIzaSyBCg5dCEM89UmYYhfGqVeRf_VrUlg8_o-4",

            projectId: "math-braves",

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);

                window.currentUser = user;
                // タイトル画面の場合、描画更新（ボタンの表示切り替えのため）
                if(window.GameInstance && window.GameInstance.isInTitle()) {
                    // 再描画のトリガーが必要ならここで行うが、requestAnimationFrameで回っているので自動反映される
                }
            });

            // ログイン処理
            window.handleGoogleAuth = async function() {
                if (auth.currentUser && !auth.currentUser.isAnonymous) {
                    // ログアウト処理
                    try {
                        await signOut(auth);
                        alert("ログアウトしました");
                    } catch(e) {
                        alert("ログアウトに失敗しました: " + e.message);
                    }
                } else {
                    // ログイン処理
                    const provider = new GoogleAuthProvider();

        }

/**
 * ゲームエンジン
 */
const Game = (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // 画像読み込み
    const bgImage = new Image();
    bgImage.src = 'images/title.png';
    
    // ゲーム状態
    const STATE = {
        TITLE: 0,
        PLAYER_SELECT: 1,
        DIFFICULTY_SELECT: 2,
        PLAYING: 3,
        ANIMATING: 4,
        GAME_OVER: 5,

    };
    
    let currentState = STATE.TITLE;
    
    const BASE_WIDTH = 1280;
    const BASE_HEIGHT = 720;
    
    // グリッド設定（中央に配置）
    const GRID_ROWS = 5;
    const GRID_COLS = 5;
    const CELL_SIZE = 110;
    // 中央エリアの計算
    const GRID_OFFSET_X = (BASE_WIDTH - CELL_SIZE * GRID_COLS) / 2;
    const GRID_OFFSET_Y = (BASE_HEIGHT - CELL_SIZE * GRID_ROWS) / 2 + 10;

    // ボス定数
    const BOSS_THRESHOLDS = [20, 50, 90, 140, 200];
    const BOSS_EMOJIS     = ['👾', '👻', '🤖', '🐦‍🔥', '🐲'];
    const MAX_BOSSES      = { easy: 3, normal: 4, hard: 5 };

    // ゲームデータ
    let grid = [];
    let score = 0;
    let turnCount = 0;
    let difficulty = 'normal';
    let matchGroupsQueue = [];
    let animationTimer = 0;
    let selectedCell = null;
    let isDragging = false;
    let currentChain = 0; // コンボ（連鎖）数

    // アイテム（流れ星）
    let starStock = 0;
    let isSelectingStar = false;

    // ボス管理
    let totalTens = 0;
    let nextBossIndex = 0;
    let bossesDefeated = 0;
    let maxBosses = 3;
    let bossSpawnPending = false;

    // ステージ管理
    let currentStage = 1;
    let isGameClear = false;

    // ヘルプ表示
    let isShowingHelp = false;

    // エフェクト管理用
    let effects = [];
    
    // プレーヤー管理
    let players = [];
    let currentPlayerIndex = -1;
    
    // ランキング用
    let rankingData = [];
    let rankingScope = 'local';
    let rankingTab = 'easy'; 
    
    // マウス/タッチ座標
    const inputState = { x: 0, y: 0, isDown: false };

    // パネルの背景色（数字ごと）
    const NUMBER_BG_COLORS = [
        "#E53935", // 1: 赤
        "#1E88E5", // 2: 青
        "#43A047", // 3: 緑
        "#8E24AA", // 4: 紫
        "#FB8C00", // 5: オレンジ
        "#00ACC1", // 6: シアン
        "#D81B60", // 7: ピンク
        "#7CB342", // 8: 黄緑
        "#6D4C41"  // 9: 茶
    ];
    
    // 初期化
    function init() {
        resize();
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousedown', handleInputStart);
        canvas.addEventListener('mousemove', handleInputMove);
        canvas.addEventListener('mouseup', handleInputEnd);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInputStart(e.touches[0]); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleInputMove(e.touches[0]); }, {passive: false});
        canvas.addEventListener('touchend', handleInputEnd);
        
        loadPlayers();
        requestAnimationFrame(loop);
        
        // グローバルにインスタンスを公開（AuthListenerからアクセス用）
        window.GameInstance = {
            isInTitle: () => currentState === STATE.TITLE
        };
    }
    
    function resize() {
        const vp = window.visualViewport;
        const scaleX = (vp ? vp.width : window.innerWidth) / BASE_WIDTH;
        const scaleY = (vp ? vp.height : window.innerHeight) / BASE_HEIGHT;
        const scale = Math.min(scaleX, scaleY);
        const container = document.getElementById('game-container');
        container.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }

    // ------------------ 確率・抽選ロジック ------------------
    
    function getWeightedRandomVal() {
        const rand = Math.random() * 100;
        if (rand < 20) return 1;
        if (rand < 39) return 2;
        if (rand < 55) return 3;
        if (rand < 69) return 4;
        if (rand < 81) return 5;
        if (rand < 89) return 6;
        if (rand < 95) return 7;
        if (rand < 98) return 8;
        return 9;
    }

    function getSpecialTileType() {
        const rand = Math.random() * 100;

        if (rand < 0.5) return 'star';
        if (rand < 1.5) return 'fireworks';

        let rockRate, coinRate, bagRate;

        if (difficulty === 'easy') {
            rockRate = 5; coinRate = 4; bagRate = 1;
        } else if (difficulty === 'normal') {
            rockRate = 10; coinRate = 4; bagRate = 1;
        } else { // hard
            rockRate = 15; coinRate = 4; bagRate = 1;
        }

        const subRand = Math.random() * 100;
        if (subRand < rockRate) return 'rock';
        if (subRand < rockRate + coinRate) return 'coin';
        if (subRand < rockRate + coinRate + bagRate) return 'bag';
        return null;
    }
    
    // ------------------ ゲームロジック ------------------
    
    function startNewGame(diff) {
        difficulty = diff;
        score = 0;
        turnCount = 0;
        currentStage = 1;
        currentChain = 0;
        starStock = 0;
        isSelectingStar = false;
        isGameClear = false;
        isShowingHelp = false;

        // ボス関連リセット
        totalTens = 0;
        nextBossIndex = 0;
        bossesDefeated = 0;
        maxBosses = MAX_BOSSES[diff];
        bossSpawnPending = false;

        grid = Array(GRID_ROWS).fill(null).map(() => Array(GRID_COLS).fill(null));
        effects = [];
        spawnNumbers(10, true);
        currentState = STATE.PLAYING;
    }
    
    function spawnNumbers(count, isInitial) {
        let emptySpots = [];
        for(let r=0; r<GRID_ROWS; r++) {
            for(let c=0; c<GRID_COLS; c++) {
                if(!grid[r][c]) emptySpots.push({r, c});
            }
        }
        
        if (emptySpots.length === 0 && !isInitial) {
            checkGameOver();
            return;
        }

        emptySpots.sort(() => Math.random() - 0.5);
        let spawnCount = Math.min(count, emptySpots.length);
        
        for(let i=0; i<spawnCount; i++) {
            let pos = emptySpots[i];
            let specialType = getSpecialTileType();

            if (specialType === 'star') {
                grid[pos.r][pos.c] = { type: 'star', val: -1, life: 1, id: Date.now() + Math.random() };
            } else if (specialType === 'fireworks') {
                grid[pos.r][pos.c] = { type: 'fireworks', val: -1, id: Date.now() + Math.random() };
            } else if (specialType === 'rock') {
                grid[pos.r][pos.c] = { type: 'rock', val: -1, hp: 1, maxHp: 1, damageFlash: 0, id: Date.now() + Math.random() };
            } else if (specialType === 'coin') {
                grid[pos.r][pos.c] = { type: 'coin', val: -1, hp: 1, maxHp: 1, damageFlash: 0, id: Date.now() + Math.random() };
            } else if (specialType === 'bag') {
                grid[pos.r][pos.c] = { type: 'bag', val: -1, hp: 2, maxHp: 2, damageFlash: 0, id: Date.now() + Math.random() };
            } else {
                // 安全な数値を選ぶ（全候補を試して見つからなければスキップ）
                // do-whileの無限ループを防ぐため、1-9をシャッフルして順番に試す
                const candidates = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
                let val = null;

                for(const candidate of candidates) {
                    let creates10 = false;

                    // 横方向のチェック
                    for(let start = 0; start <= pos.c; start++) {
                        for(let end = pos.c; end < GRID_COLS; end++) {
                            let sum = 0;
                            let possible = true;
                            for(let k = start; k <= end; k++) {
                                let v;
                                if(k === pos.c) {
                                    v = candidate;
                                } else {
                                    let cell = grid[pos.r][k];
                                    if(cell && cell.type === 'number') {
                                        v = cell.val;
                                    } else {
                                        // 数値以外（空・アイテム等）が挟まると連続しない
                                        possible = false;
                                        break;
                                    }
                                }
                                sum += v;
                            }
                            if(possible && sum === 10) {
                                creates10 = true;
                                break;
                            }
                        }
                        if(creates10) break;
                    }

                    if(!creates10) {
                        // 縦方向のチェック
                        for(let start = 0; start <= pos.r; start++) {
                            for(let end = pos.r; end < GRID_ROWS; end++) {
                                let sum = 0;
                                let possible = true;
                                for(let k = start; k <= end; k++) {
                                    let v;
                                    if(k === pos.r) {
                                        v = candidate;
                                    } else {
                                        let cell = grid[k][pos.c];
                                        if(cell && cell.type === 'number') {
                                            v = cell.val;
                                        } else {
                                            possible = false;
                                            break;
                                        }
                                    }
                                    sum += v;
                                }
                                if(possible && sum === 10) {
                                    creates10 = true;
                                    break;
                                }
                            }
                            if(creates10) break;
                        }
                    }

                    if(!creates10) {
                        val = candidate;
                        break;
                    }
                }

                // 有効な値が見つかった場合のみ配置（全値が10を作る稀なケースはスキップ）
                if(val !== null) {
                    grid[pos.r][pos.c] = { type: 'number', val: val, id: Date.now() + Math.random() };
                }
            }
        }
        
        if (!isInitial) {
            let full = true;
            for(let r=0; r<GRID_ROWS; r++) {
                for(let c=0; c<GRID_COLS; c++) {
                    if(!grid[r][c]) full = false;
                }
            }
        }
    }
    
    function findMatches() {
        let groups = [];
        // 横
        for(let r=0; r<GRID_ROWS; r++) {
            let rowCells = [];
            for(let c=0; c<GRID_COLS; c++) {
                if(grid[r][c] && grid[r][c].type === 'number') {
                    rowCells.push({val: grid[r][c].val, r, c});
                } else {
                    rowCells.push(null); 
                }
            }
            checkLine(rowCells, groups);
        }
        // 縦
        for(let c=0; c<GRID_COLS; c++) {
            let colCells = [];
            for(let r=0; r<GRID_ROWS; r++) {
                if(grid[r][c] && grid[r][c].type === 'number') {
                    colCells.push({val: grid[r][c].val, r, c});
                } else {
                    colCells.push(null);
                }
            }
            checkLine(colCells, groups);
        }

        // 周囲巻き込み処理
        groups.forEach(group => {
            let extrasToAdd = [];
            let checkSet = new Set(); 
            group.forEach(cell => {
                const neighbors = [
                    {r: cell.r-1, c: cell.c}, {r: cell.r+1, c: cell.c},
                    {r: cell.r, c: cell.c-1}, {r: cell.r, c: cell.c+1}
                ];
                neighbors.forEach(n => {
                    if(n.r >= 0 && n.r < GRID_ROWS && n.c >= 0 && n.c < GRID_COLS) {
                        let target = grid[n.r][n.c];
                        // 流れ星(star)も巻き込み対象に追加
                        // ダイヤ(diamond)も巻き込み対象に追加
                        if(target && target.type === 'star') {
                            let key = `${n.r},${n.c}`;
                            if(!checkSet.has(key)) {
                                checkSet.add(key);
                                extrasToAdd.push({r: n.r, c: n.c, type: target.type}); 
                            }
                        }
                    }
                });
            });
            extrasToAdd.forEach(m => group.push(m));
        });

        return groups;
    }
    
    function checkLine(line, groups) {
        for(let start=0; start<line.length; start++) {
            if(line[start] === null) continue;
            let sum = 0;
            let currentGroup = [];
            
            for(let end=start; end<line.length; end++) {
                if(line[end] === null) break;
                sum += line[end].val;
                currentGroup.push({r: line[end].r, c: line[end].c, type: 'number'});
                
                if(sum === 10) {
                    if(currentGroup.length >= 2) {
                        groups.push([...currentGroup]);
                    }
                }
                if(sum > 10) break;
            }
        }
    }
    
    // マッチ判定とスコア計算、ライフ消費を統括する関数
    function resolveMatches(consumeLife) {
        const matches = findMatches();

        let fireworksToExplode = [];
        let matchKeys = new Set();
        let numberMatchKeys = new Set(); // 数値タイルのみ（障害物ダメージ用）
        matches.forEach(group => {
            group.forEach(cell => {
                matchKeys.add(`${cell.r},${cell.c}`);
                if (cell.type === 'number') numberMatchKeys.add(`${cell.r},${cell.c}`);
                // 隣接する花火を探す
                const neighbors = [
                    {r: cell.r-1, c: cell.c}, {r: cell.r+1, c: cell.c},
                    {r: cell.r, c: cell.c-1}, {r: cell.r, c: cell.c+1}
                ];
                neighbors.forEach(n => {
                    if(n.r >= 0 && n.r < GRID_ROWS && n.c >= 0 && n.c < GRID_COLS) {
                        if(grid[n.r][n.c] && grid[n.r][n.c].type === 'fireworks') {
                            fireworksToExplode.push(n);
                        }
                    }
                });
            });
        });

        // ターンカウント
        if (consumeLife) {
            turnCount++;
        }

        let uniqueRemovedKeys = new Set();
        let weightedPointTotal = 0;

        if(matches.length > 0) {
            // 10達成回数を加算
            totalTens += matches.length;
            currentChain += matches.length;

            // ボス出現チェック
            if(!bossSpawnPending && nextBossIndex < maxBosses &&
               totalTens >= BOSS_THRESHOLDS[nextBossIndex]) {
                nextBossIndex++;
                bossSpawnPending = true;
            }

            // 障害物への隣接ダメージ判定（数値タイルのみ、セル削除前に実施）
            checkObstacleAdjacentDamage(numberMatchKeys);

            matches.forEach(group => {
                group.forEach(cell => {
                    const key = `${cell.r},${cell.c}`;
                    if(!uniqueRemovedKeys.has(key)) {
                        uniqueRemovedKeys.add(key);
                        const actualCell = grid[cell.r][cell.c];
                        if (actualCell) {
                            if (actualCell.type === 'number') {
                                weightedPointTotal += 1;
                            } else if (actualCell.type === 'star') {
                                starStock++;
                                effects.push({
                                    x: GRID_OFFSET_X + cell.c * CELL_SIZE + CELL_SIZE/2,
                                    y: GRID_OFFSET_Y + cell.r * CELL_SIZE + CELL_SIZE/2,
                                    text: "GET!",
                                    life: 50,
                                    maxLife: 50,
                                    color: "#FFD700",
                                    scale: 0.8
                                });
                            }
                        }
                    }
                });
            });
        }

        // 花火の効果実行（十字消去）
        if (fireworksToExplode.length > 0) {
            fireworksToExplode.forEach(fw => {
                // 花火自体も消える
                if(!uniqueRemovedKeys.has(`${fw.r},${fw.c}`)) {
                    uniqueRemovedKeys.add(`${fw.r},${fw.c}`);
                    effects.push({
                        x: GRID_OFFSET_X + fw.c * CELL_SIZE + CELL_SIZE/2,
                        y: GRID_OFFSET_Y + fw.r * CELL_SIZE + CELL_SIZE/2,
                        text: "🎆",
                        life: 60, maxLife: 60, color: "#FF4081", scale: 2.0
                    });
                }

                // 横一列
                for(let c=0; c<GRID_COLS; c++) {
                    let key = `${fw.r},${c}`;
                    if(!uniqueRemovedKeys.has(key)) {
                        if(grid[fw.r][c]) {
                            uniqueRemovedKeys.add(key);
                            weightedPointTotal += 1; // 花火で消えたものは一律1点換算とする
                        }
                    }
                }
                // 縦一列
                for(let r=0; r<GRID_ROWS; r++) {
                    let key = `${r},${fw.c}`;
                    if(!uniqueRemovedKeys.has(key)) {
                        if(grid[r][fw.c]) {
                            uniqueRemovedKeys.add(key);
                            weightedPointTotal += 1;
                        }
                    }
                }
            });
        }

        // 削除対象をmatchGroupsQueue形式に変換してアニメーションへ
        if(uniqueRemovedKeys.size > 0) {
            let group = [];
            uniqueRemovedKeys.forEach(k => {
                let [r, c] = k.split(',').map(Number);
                group.push({r, c});
            });
            
            // スコア計算
            let pts = weightedPointTotal * (currentChain > 0 ? currentChain : 1) * 100;
            score += pts;

            // 演出
            if(pts > 0) {
                setTimeout(() => {
                    effects.push({
                        x: BASE_WIDTH / 2,
                        y: BASE_HEIGHT / 2 - 50,
                        text: currentChain > 1 ? `x${currentChain} COMBO!` : "FIRE!",
                        life: 75, maxLife: 75, color: "#FF6D00", scale: 1.5, stroke: "#FFF"
                    });
                }, 400);
                setTimeout(() => {
                    effects.push({
                         x: BASE_WIDTH / 2,
                         y: BASE_HEIGHT / 2 + 60,
                         text: `+${pts}`,
                         life: 60, maxLife: 60, color: "#FFFFFF", scale: 1.2, stroke: "#000"
                    });
                }, 900);
            }

            matchGroupsQueue.push(group);
            currentState = STATE.ANIMATING;
            animationTimer = performance.now();

        } else {
            // マッチ無し
            if (consumeLife) {
                // プレイヤー操作後の場合、リフィルへ
                processRefill();
            } else {
                // リフィル後の自動チェックでマッチ無し＝連鎖終了
                // ここでゲームオーバー判定
                checkGameOver();
            }
        }
    }
    
    function useStarItem(targetVal) {
        starStock--;
        let removed = false;
        
        // 指定された数字を全て消去
        for(let r=0; r<GRID_ROWS; r++) {
            for(let c=0; c<GRID_COLS; c++) {
                if(grid[r][c] && grid[r][c].type === 'number' && grid[r][c].val === targetVal) {
                    grid[r][c] = null;
                    removed = true;
                    // エフェクト
                    effects.push({
                        x: GRID_OFFSET_X + c * CELL_SIZE + CELL_SIZE/2,
                        y: GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE/2,
                        text: "★",
                        life: 40,
                        maxLife: 40,
                        color: "#FFF",
                        scale: 1.0
                    });
                    // 隣接する障害物に1ダメージ
                    const neighbors = [
                        {r: r-1, c: c}, {r: r+1, c: c},
                        {r: r, c: c-1}, {r: r, c: c+1}
                    ];
                    neighbors.forEach(n => {
                        if(n.r >= 0 && n.r < GRID_ROWS && n.c >= 0 && n.c < GRID_COLS) {
                            const adj = grid[n.r][n.c];
                            if(adj && adj.type === 'boss') damageBoss(n.r, n.c);
                            else if(adj && (adj.type === 'rock' || adj.type === 'coin' ||
                                            adj.type === 'bag' || adj.type === 'diamond')) {
                                damageObstacle(n.r, n.c);
                            }
                        }
                    });
                }
            }
        }
        
        isSelectingStar = false;
        if(removed) {
            currentChain = 0;
            // リフィルを呼ばずに終了
        }
    }

    // 障害物（ボス/岩/コイン/バッグ/ダイヤ）への隣接ダメージ判定
    function checkObstacleAdjacentDamage(numberMatchKeys) {
        for(let r=0; r<GRID_ROWS; r++) {
            for(let c=0; c<GRID_COLS; c++) {
                let cell = grid[r][c];
                if(!cell) continue;
                if(cell.type === 'boss' || cell.type === 'rock' ||
                   cell.type === 'coin' || cell.type === 'bag' || cell.type === 'diamond') {
                    const neighbors = [
                        {r: r-1, c: c}, {r: r+1, c: c},
                        {r: r, c: c-1}, {r: r, c: c+1}
                    ];
                    let hits = 0;
                    neighbors.forEach(n => { if(numberMatchKeys.has(`${n.r},${n.c}`)) hits++; });
                    for(let i = 0; i < hits; i++) {
                        cell = grid[r][c];
                        if(!cell) break;
                        if(cell.type === 'boss') damageBoss(r, c);
                        else damageObstacle(r, c);
                    }
                }
            }
        }
    }

    function damageBoss(r, c) {
        let boss = grid[r][c];
        if(!boss || boss.type !== 'boss') return;
        boss.hp--;
        boss.damageFlash = 20;
        effects.push({
            x: GRID_OFFSET_X + c * CELL_SIZE + CELL_SIZE/2,
            y: GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE/2,
            text: "💥 -1",
            life: 40, maxLife: 40,
            color: "#FF1744", scale: 1.0, stroke: "#fff"
        });
        if(boss.hp <= 0) {
            const bIdx = boss.bossIndex;
            grid[r][c] = null;
            stageComplete(bIdx);
        }
    }

    function damageObstacle(r, c) {
        let cell = grid[r][c];
        if(!cell) return;
        cell.hp--;
        cell.damageFlash = 20;
        effects.push({
            x: GRID_OFFSET_X + c * CELL_SIZE + CELL_SIZE/2,
            y: GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE/2,
            text: "💥 -1",
            life: 40, maxLife: 40,
            color: "#FF1744", scale: 0.8, stroke: "#fff"
        });
        if(cell.hp <= 0) {
            let pts = 0;
            if(cell.type === 'coin') pts = 300;
            else if(cell.type === 'bag') pts = 1000;
            else if(cell.type === 'diamond') pts = 2000;
            if(pts > 0) {
                score += pts;
                effects.push({
                    x: GRID_OFFSET_X + c * CELL_SIZE + CELL_SIZE/2,
                    y: GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE/2,
                    text: `+${pts}`,
                    life: 60, maxLife: 60,
                    color: "#FFD700", scale: 1.0, stroke: "#000"
                });
            }
            grid[r][c] = null;
        }
    }

    function checkBossSpawn() {
        if(!bossSpawnPending) return;
        let emptySpots = [];
        for(let r=0; r<GRID_ROWS; r++) {
            for(let c=0; c<GRID_COLS; c++) {
                if(!grid[r][c]) emptySpots.push({r, c});
            }
        }
        if(emptySpots.length === 0) {
            currentState = STATE.GAME_OVER;
            saveScore();
            return;
        }
        const pos = emptySpots[Math.floor(Math.random() * emptySpots.length)];
        const bIdx = nextBossIndex - 1;
        const BOSS_HPS = [5, 7, 9, 11, 13];
        const hp = BOSS_HPS[bIdx] || 5;
        grid[pos.r][pos.c] = { type: 'boss', val: -1, hp: hp, maxHp: hp, bossIndex: bIdx, damageFlash: 0, id: Date.now() + Math.random() };
        bossSpawnPending = false;
        effects.push({
            x: BASE_WIDTH / 2,
            y: BASE_HEIGHT / 2 - 60,
            text: `${BOSS_EMOJIS[bIdx]} BOSS 登場！`,
            life: 90, maxLife: 90,
            color: "#FF1744", scale: 1.4, stroke: "#fff"
        });
    }

    function stageComplete(bossIdx) {
        bossesDefeated++;
        currentStage = bossesDefeated + 1;
        const emoji = BOSS_EMOJIS[bossIdx] || '👾';
        setTimeout(() => {
            effects.push({
                x: BASE_WIDTH / 2,
                y: BASE_HEIGHT / 2,
                text: `${emoji} 撃破！`,
                life: 150, maxLife: 150,
                color: "#FFEB3B",
                subText: "👑",
                isBig: true
            });
        }, 200);
        if(bossesDefeated >= maxBosses) {
            setTimeout(() => gameClear(), 2000);
        }
    }

    function gameClear() {
        currentState = STATE.GAME_OVER;
        isGameClear = true;
        saveScore();
    }

    // ボスが岩を生み出す（50%確率）
    function produceBossRocks() {
        for(let r=0; r<GRID_ROWS; r++) {
            for(let c=0; c<GRID_COLS; c++) {
                if(grid[r][c] && grid[r][c].type === 'boss') {
                    let emptyNeighbors = [];
                    const neighbors = [
                        {r: r-1, c: c}, {r: r+1, c: c},
                        {r: r, c: c-1}, {r: r, c: c+1}
                    ];
                    neighbors.forEach(n => {
                        if(n.r >= 0 && n.r < GRID_ROWS && n.c >= 0 && n.c < GRID_COLS) {
                            if(!grid[n.r][n.c]) emptyNeighbors.push(n);
                        }
                    });
                    if(emptyNeighbors.length > 0 && Math.random() < 0.5) {
                        const target = emptyNeighbors[Math.floor(Math.random() * emptyNeighbors.length)];
                        grid[target.r][target.c] = { type: 'rock', val: -1, hp: 1, maxHp: 1, damageFlash: 0, id: Date.now() + Math.random() };
                        effects.push({
                            x: GRID_OFFSET_X + target.c * CELL_SIZE + CELL_SIZE/2,
                            y: GRID_OFFSET_Y + target.r * CELL_SIZE + CELL_SIZE/2,
                            text: "🪨",
                            life: 30, maxLife: 30, color: "#fff", scale: 1.0
                        });
                    }
                }
            }
        }
    }

    function processRefill() {
        // ボス出現待ちならここで出現させる
        if(bossSpawnPending) {
            checkBossSpawn();
            if(currentState === STATE.GAME_OVER) return;
        }

        // ボスが岩を生み出す
        produceBossRocks();

        // 出現パラメーター
        let spawnParamX = 0;
        if(difficulty === 'easy') spawnParamX = 1.8;
        else if(difficulty === 'normal') spawnParamX = 2.4;
        else spawnParamX = 3.0; // hard

        // ステージ進行による増加（+0.20/stage）
        spawnParamX += (currentStage - 1) * 0.20;

        let count = Math.floor(spawnParamX);
        let probability = spawnParamX - count;
        if(Math.random() < probability) count++;

        spawnNumbers(count, false);
        resolveMatches(false);
    }
    
    function checkGameOver() {
        let full = true;
        for(let r=0; r<GRID_ROWS; r++) {
            for(let c=0; c<GRID_COLS; c++) {
                if(!grid[r][c]) full = false;
            }
        }
        if(full) {
            currentState = STATE.GAME_OVER;
            saveScore();
        }
    }
    
    function update() {
        // 全セルのダメージフラッシュ更新
        for(let r=0; r<GRID_ROWS; r++) {
            for(let c=0; c<GRID_COLS; c++) {
                if(grid[r] && grid[r][c] && grid[r][c].damageFlash > 0) {
                    grid[r][c].damageFlash--;
                }
            }
        }

        // エフェクト更新
        for(let i = effects.length - 1; i >= 0; i--) {
            effects[i].life--;
            effects[i].y -= 0.6;
            if(effects[i].life <= 0) {
                effects.splice(i, 1);
            }
        }

        if (currentState === STATE.ANIMATING) {
            const now = performance.now();
            if (matchGroupsQueue.length > 0) {
                if (now - animationTimer > 300) {
                    const group = matchGroupsQueue.shift();
                    applyScoreAndRemove(group);
                    animationTimer = now;
                    
                    if (matchGroupsQueue.length === 0) {
                        // アニメーション終了後、リフィルへ（連鎖中なら再度resolveMatchesが呼ばれることになる）
                        setTimeout(() => {
                            currentState = STATE.PLAYING;
                            processRefill();
                        }, 100);
                    }
                }
            }
        }
    }
    
    function applyScoreAndRemove(group) {
        let uniqueGroup = [];
        let seen = new Set();
        group.forEach(pos => {
            let key = `${pos.r},${pos.c}`;
            if(!seen.has(key)) {
                seen.add(key);
                uniqueGroup.push(pos);
            }
        });
        uniqueGroup.forEach(pos => {
            if(grid[pos.r][pos.c]) grid[pos.r][pos.c] = null;
        });
    }
    
    // ------------------ 描画 ------------------

        ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);
        
        switch(currentState) {
            case STATE.TITLE: drawTitle(); break;
            case STATE.PLAYER_SELECT: drawPlayerSelect(); break;
            case STATE.DIFFICULTY_SELECT: drawDifficultySelect(); break;
            case STATE.PLAYING:
            case STATE.ANIMATING:
            case STATE.GAME_OVER:
                drawGame();
                if(currentState === STATE.GAME_OVER) drawGameOver();
                break;
            case STATE.RANKING: drawRanking(); break;
        }
    }

    function drawGame() {
        // ギリギリ演出
        let emptyCount = 0;
        for(let r=0; r<GRID_ROWS; r++) {
            for(let c=0; c<GRID_COLS; c++) {
                if(!grid[r][c]) emptyCount++;
            }
        }
        if (emptyCount <= 3 && currentState === STATE.PLAYING) {
            let alpha = 0.3 + 0.2 * Math.sin(Date.now() / 150);
            ctx.lineWidth = 15;
            ctx.strokeStyle = `rgba(255, 0, 0, ${alpha})`;
            ctx.strokeRect(0, 0, BASE_WIDTH, BASE_HEIGHT);
        }

                    drawCellContent(x, y, cell);
                }
            }
        }

        if(isDragging && selectedCell) {
            let cell = grid[selectedCell.r][selectedCell.c];

                drawCellContent(inputState.x - CELL_SIZE/2, inputState.y - CELL_SIZE/2, cell, true);

            // ステージクリアなどの大演出
            if (ef.isBig) {
                ctx.fillStyle = "rgba(0,0,0,0.7)"; // 背景暗転

                // 縁取り（視認性向上）

                    ctx.strokeStyle = ef.stroke;
                    ctx.lineWidth = 4;
                    ctx.strokeText(ef.text, 0, 0);
                } else {
                    // 指定がない場合のデフォルト縁取り
                    ctx.strokeStyle = "rgba(0,0,0,0.5)";
                    ctx.lineWidth = 4;
                    ctx.strokeText(ef.text, 0, 0);
                }
                
                ctx.fillStyle = ef.color || "#D84315";
                ctx.fillText(ef.text, 0, 0);
            }
            ctx.restore();
        });
    }

    function drawCellContent(x, y, cell, shadow=false) {
        if(cell.type === 'star' || cell.type === 'fireworks') {
            ctx.fillStyle = "#FFFFFF";
        } else if(cell.type === 'rock' || cell.type === 'coin' || cell.type === 'bag' || cell.type === 'diamond') {
            ctx.fillStyle = cell.damageFlash > 0 ? "#FF5252" : "#FFFFFF";
        } else if(cell.type === 'boss') {
            ctx.fillStyle = cell.damageFlash > 0 ? "#FF5252" : "#FFEBEE";
        } else {
            ctx.fillStyle = NUMBER_BG_COLORS[cell.val - 1] || "#333";
        }

        if(shadow) {
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.shadowBlur = 10;
        } else {
            ctx.shadowBlur = 0;
        }

        roundRect(ctx, x+5, y+5, CELL_SIZE-10, CELL_SIZE-10, 15, true, false);
        ctx.shadowBlur = 0;

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        if (cell.type === 'rock' || cell.type === 'coin' || cell.type === 'bag' || cell.type === 'diamond') {
            const emojis = { rock: "🪨", coin: "🪙", bag: "💰", diamond: "💎" };
            const barColors = { rock: "#78909C", coin: "#FFA000", bag: "#388E3C", diamond: "#1565C0" };
            ctx.font = "62px sans-serif";
            ctx.fillText(emojis[cell.type], x + CELL_SIZE/2, y + CELL_SIZE/2 - 8);
            // HPバー
            const barW = CELL_SIZE - 18, barH = 10;
            const barX = x + 9, barY = y + CELL_SIZE - 20;
            ctx.fillStyle = "#EF9A9A";
            roundRect(ctx, barX, barY, barW, barH, 4, true, false);
            const hpRatio = (cell.hp || 0) / (cell.maxHp || 1);
            ctx.fillStyle = barColors[cell.type] || "#888";
            if(hpRatio > 0) roundRect(ctx, barX, barY, barW * hpRatio, barH, 4, true, false);
        } else if (cell.type === 'boss') {
            const emoji = BOSS_EMOJIS[cell.bossIndex] || '👾';
            ctx.font = "60px sans-serif";
            ctx.fillText(emoji, x + CELL_SIZE/2, y + CELL_SIZE/2 - 8);
            // HPバー
            const barW = CELL_SIZE - 18, barH = 10;
            const barX = x + 9, barY = y + CELL_SIZE - 20;
            ctx.fillStyle = "#EF9A9A";
            roundRect(ctx, barX, barY, barW, barH, 4, true, false);
            const hpRatio = cell.hp / cell.maxHp;
            ctx.fillStyle = "#C62828";
            if(hpRatio > 0) roundRect(ctx, barX, barY, barW * hpRatio, barH, 4, true, false);
        } else if (cell.type === 'star') {
            ctx.font = "80px sans-serif";
            ctx.fillText("🌠", x + CELL_SIZE/2, y + CELL_SIZE/2);
        } else if (cell.type === 'fireworks') {
            ctx.font = "80px sans-serif";
            ctx.fillText("🎆", x + CELL_SIZE/2, y + CELL_SIZE/2);
        } else {
            ctx.fillStyle = "#FFFFFF";
            ctx.font = "bold 65px 'M PLUS Rounded 1c'";
            ctx.fillText(cell.val, x + CELL_SIZE/2, y + CELL_SIZE/2 + 5);
        }
    }

    function drawButton(x, y, w, h, text, color, textColor="#fff") {
        ctx.save();
        ctx.translate(x - w/2, y - h/2);
        ctx.fillStyle = color;
        roundRect(ctx, 0, 0, w, h, 10, true, false);
        ctx.fillStyle = textColor;
        ctx.font = "bold 24px 'M PLUS Rounded 1c'";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, w/2, h/2);
        ctx.restore();
    }
    
    function roundRect(ctx, x, y, w, h, r, fill, stroke) {
        ctx.beginPath();
        ctx.moveTo(x+r, y);
        ctx.arcTo(x+w, y, x+w, y+h, r);
        ctx.arcTo(x+w, y+h, x, y+h, r);
        ctx.arcTo(x, y+h, x, y, r);
        ctx.arcTo(x, y, x+w, y, r);
        ctx.closePath();
        if (fill) ctx.fill();
        if (stroke) ctx.stroke();
    }
    
    // ------------------ 入力処理 ------------------
    
    function handleInputStart(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        inputState.x = ( (e.clientX || e.pageX) - rect.left) * scaleX;
        inputState.y = ( (e.clientY || e.pageY) - rect.top) * scaleY;
        inputState.isDown = true;
        
        if(currentState === STATE.TITLE) checkTitleClick(inputState.x, inputState.y);
        else if(currentState === STATE.PLAYER_SELECT) checkPlayerSelectClick(inputState.x, inputState.y);
        else if(currentState === STATE.DIFFICULTY_SELECT) checkDifficultyClick(inputState.x, inputState.y);
        else if(currentState === STATE.PLAYING) checkGameClick(inputState.x, inputState.y);
        else if(currentState === STATE.GAME_OVER) checkGameOverClick(inputState.x, inputState.y);
        else if(currentState === STATE.RANKING) checkRankingClick(inputState.x, inputState.y);
    }
    
    function handleInputMove(e) {
        if(!inputState.isDown) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        inputState.x = ( (e.clientX || e.pageX) - rect.left) * scaleX;
        inputState.y = ( (e.clientY || e.pageY) - rect.top) * scaleY;
        if(currentState === STATE.PLAYING && selectedCell) isDragging = true;
    }
    
    function handleInputEnd(e) {
        inputState.isDown = false;
        if(currentState === STATE.PLAYING && isDragging && selectedCell) {
            let c = Math.floor((inputState.x - GRID_OFFSET_X) / CELL_SIZE);
            let r = Math.floor((inputState.y - GRID_OFFSET_Y) / CELL_SIZE);
            if(r >= 0 && r < GRID_ROWS && c >= 0 && c < GRID_COLS) {
                if(!grid[r][c]) {
                    grid[r][c] = grid[selectedCell.r][selectedCell.c];
                    grid[selectedCell.r][selectedCell.c] = null;
                    // 移動完了：コンボカウントリセットしてマッチ判定へ
                    currentChain = 0;
                    resolveMatches(true); // true = プレイヤー操作なのでライフ消費あり
                }
            }
        }
        selectedCell = null;
        isDragging = false;
    }
    
    function isBtnClicked(mx, my, x, y, w, h) {
        return mx >= x - w/2 && mx <= x + w/2 && my >= y - h/2 && my <= y + h/2;
    }
    
    function checkTitleClick(x, y) {
        const startY = 320;
        const gap = 75;
        if(isBtnClicked(x, y, BASE_WIDTH/2, startY, 320, 60)) {
            if(currentPlayerIndex === -1) alert("プレーヤーを選択してね");
            else currentState = STATE.DIFFICULTY_SELECT;
        }
        else if(isBtnClicked(x, y, BASE_WIDTH/2, startY+gap, 320, 60)) currentState = STATE.PLAYER_SELECT;
        else if(isBtnClicked(x, y, BASE_WIDTH/2, startY+gap*2, 320, 60)) {
            if(window.handleGoogleAuth) window.handleGoogleAuth();
            else alert("読み込み中...");
        }
        else if(isBtnClicked(x, y, BASE_WIDTH/2, startY+gap*3, 320, 60)) {
            rankingScope = 'local'; rankingTab = 'easy'; updateRankingView(); currentState = STATE.RANKING;
        }
        else if(isBtnClicked(x, y, BASE_WIDTH/2, startY+gap*4, 320, 60)) window.location.href = '../index.html';
    }
    
    function checkPlayerSelectClick(x, y) {
        if(isBtnClicked(x, y, BASE_WIDTH/2, 650, 200, 50)) { currentState = STATE.TITLE; return; }
        for(let i=0; i<players.length; i++) {
            let by = 180 + i * 80;
            if(isBtnClicked(x, y, BASE_WIDTH/2, by, 400, 60)) { currentPlayerIndex = i; localStorage.setItem('tasuten_last_player', i); }
            if(isBtnClicked(x, y, BASE_WIDTH/2 + 250, by, 60, 60)) {
                players.splice(i, 1);
                if(currentPlayerIndex === i) currentPlayerIndex = -1;
                else if(currentPlayerIndex > i) currentPlayerIndex--;
                savePlayers();
                return;
            }
        }
        if(players.length < 5) {
            let by = 180 + players.length * 80;
            if(isBtnClicked(x, y, BASE_WIDTH/2, by, 400, 60)) {
                document.getElementById('playerInputOverlay').style.display = 'flex';
                document.getElementById('inputError').innerText = "";
                document.getElementById('playerNameInput').value = "";
            }
        }
    }
    
    function checkDifficultyClick(x, y) {
        if(isBtnClicked(x, y, BASE_WIDTH/2, 300, 300, 70)) startNewGame('easy');
        else if(isBtnClicked(x, y, BASE_WIDTH/2, 400, 300, 70)) startNewGame('normal');
        else if(isBtnClicked(x, y, BASE_WIDTH/2, 500, 300, 70)) startNewGame('hard');
        else if(isBtnClicked(x, y, BASE_WIDTH/2, 620, 200, 50)) currentState = STATE.TITLE;
    }
    
    function checkGameClick(x, y) {
        // ヘルプ表示中
        if(isShowingHelp) {
            const ph = 590, py = BASE_HEIGHT/2 - ph/2;
            if(isBtnClicked(x, y, BASE_WIDTH/2, py + ph - 36, 200, 50)) isShowingHelp = false;
            return;
        }

        // アイテム選択中のクリック処理
        if(isSelectingStar) {
            for(let i=1; i<=9; i++) {
                let r = Math.floor((i-1)/3);
                let c = (i-1)%3;
                let btnX = BASE_WIDTH/2 - 100 + c * 100;
                let btnY = BASE_HEIGHT/2 - 120 + r * 100;
                if(isBtnClicked(x, y, btnX, btnY, 80, 80)) {
                    useStarItem(i);
                }
            }
            // やめるボタン
            if(isBtnClicked(x, y, BASE_WIDTH/2, BASE_HEIGHT/2 + 180, 150, 50)) {
                isSelectingStar = false;
            }
            return; // 選択中は盤面操作無効
        }

        // タイトルへボタン（右上）
        if(isBtnClicked(x, y, 1130, 38, 230, 48)) {
            if(confirm("タイトルへ戻りますか？ゲームオーバーになります")) {
                currentState = STATE.GAME_OVER; saveScore();
            }
            return;
        }

        // あそびかたボタン（左上）
        if(isBtnClicked(x, y, 150, 38, 230, 48)) {
            isShowingHelp = true;
            return;
        }

        // アイテムボタン（右パネル）
        if(starStock > 0 && isBtnClicked(x, y, 1130, 300, 200, 52)) {
            isSelectingStar = true;
            return;
        }

        let c = Math.floor((x - GRID_OFFSET_X) / CELL_SIZE);
        let r = Math.floor((y - GRID_OFFSET_Y) / CELL_SIZE);
        if(r >= 0 && r < GRID_ROWS && c >= 0 && c < GRID_COLS) {
            if(grid[r][c]) selectedCell = {r, c};
        }
    }
    
    function checkGameOverClick(x, y) {
        if(isBtnClicked(x, y, BASE_WIDTH/2, 550, 300, 60)) currentState = STATE.TITLE;
    }
    
    function checkRankingClick(x, y) {
        if(isBtnClicked(x, y, BASE_WIDTH/2, 650, 200, 50)) { currentState = STATE.TITLE; return; }
        const scopeY = 120;
        if(isBtnClicked(x, y, BASE_WIDTH/2 - 150, scopeY, 280, 45)) { if(rankingScope !== 'local') { rankingScope = 'local'; updateRankingView(); } }
        else if(isBtnClicked(x, y, BASE_WIDTH/2 + 150, scopeY, 280, 45)) { if(rankingScope !== 'world') { rankingScope = 'world'; updateRankingView(); } }
        const tabY = 180;
        if(isBtnClicked(x, y, BASE_WIDTH/2 - 220, tabY, 200, 50)) { if(rankingTab !== 'easy') { rankingTab = 'easy'; updateRankingView(); } }
        else if(isBtnClicked(x, y, BASE_WIDTH/2, tabY, 200, 50)) { if(rankingTab !== 'normal') { rankingTab = 'normal'; updateRankingView(); } }
        else if(isBtnClicked(x, y, BASE_WIDTH/2 + 220, tabY, 200, 50)) { if(rankingTab !== 'hard') { rankingTab = 'hard'; updateRankingView(); } }
    }

    // ------------------ プレーヤー管理 ------------------
    
    function loadPlayers() {
        const data = localStorage.getItem('tasuten_players');
        if(data) players = JSON.parse(data);
        const last = localStorage.getItem('tasuten_last_player');
        if(last !== null) { currentPlayerIndex = parseInt(last); if(currentPlayerIndex >= players.length) currentPlayerIndex = -1; }
    }
    
    function savePlayers() {
        localStorage.setItem('tasuten_players', JSON.stringify(players));
        if(currentPlayerIndex >= 0) localStorage.setItem('tasuten_last_player', currentPlayerIndex);
    }
    
    function registerPlayer() {
        const input = document.getElementById('playerNameInput');
        const err = document.getElementById('inputError');
        const name = input.value.trim();
        if(!name) { err.innerText = "なまえをいれてね"; return; }
        if(name.length > 8) { err.innerText = "8もじいないにしてね"; return; }
        if(!/^[ぁ-んー]+$/.test(name)) { err.innerText = "ひらがなだけでいれてね"; return; }
        for(let ng of NG_WORDS_HIRAGANA) { if(name.includes(ng)) { err.innerText = "つかえないことばがふくまれています"; return; } }
        players.push(name);
        currentPlayerIndex = players.length - 1;
        savePlayers();
        document.getElementById('playerInputOverlay').style.display = 'none';
    }
    
    function closePlayerInput() { document.getElementById('playerInputOverlay').style.display = 'none'; }
    
    // ------------------ データ保存・ランキング ------------------
    
    function saveScore() {
        if(currentPlayerIndex === -1) return;
        const playerName = players[currentPlayerIndex];
        const scoreData = { name: playerName, score: score, difficulty: difficulty, stage: currentStage, date: Date.now() };
        let localScores = JSON.parse(localStorage.getItem('tasuten_scores') || "[]");
        localScores.push(scoreData);
        localStorage.setItem('tasuten_scores', JSON.stringify(localScores));
        
        // 修正：Firebase v9対応
        if(window.dbInstance && window.addDoc) {
            window.addDoc(window.collection(window.dbInstance, COLLECTION_NAME), {
                name: playerName, score: score, difficulty: difficulty, stage: currentStage,
                uid: window.currentUser ? window.currentUser.uid : "guest",
                date: window.serverTimestamp()
            }).catch(err => console.error("Score save error", err));
        }
    }
    
    function updateRankingView() {
        rankingData = [];
        if(rankingScope === 'local') fetchLocalRanking(rankingTab);
        else fetchWorldRanking(rankingTab);
    }

    function fetchLocalRanking(diff) {
        let localScores = JSON.parse(localStorage.getItem('tasuten_scores') || "[]");
        rankingData = localScores.filter(d => d.difficulty === diff).sort((a, b) => b.score - a.score).slice(0, 10);
    }
    
    function fetchWorldRanking(diff) {
        if(!window.dbInstance) return;
        
        // 修正：Firebase v9対応 & エラーハンドリング（インデックス用）
        const q = window.query(
            window.collection(window.dbInstance, COLLECTION_NAME),
            window.where("difficulty", "==", diff),
            window.orderBy("score", "desc"),
            window.limit(10)
        );

        window.getDocs(q)
            .then(snapshot => {
                rankingData = [];
                snapshot.forEach(doc => rankingData.push(doc.data()));
            })
            .catch(err => {
                console.error("Ranking fetch error", err);
                
                // インデックスエラーの場合の処理（リンクをオーバーレイ表示）
                const match = err.message.match(/https:\/\/console\.firebase\.google\.com[^\s]*/);
                if (err.code === 'failed-precondition' || match) {
                    let url = match ? match[0] : '#';
                    const link = document.getElementById('dbErrorLink');
                    link.href = url;
                    document.getElementById('dbErrorOverlay').style.display = 'flex';
                }
            });
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    window.onload = init;
    return { registerPlayer: registerPlayer, closePlayerInput: closePlayerInput };
})();
</script>
