<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>アリスメティカ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game-container">

  <!-- ===== タイトル画面 ===== -->
  <div id="screen-title" class="screen active">
    <div class="title-bg"></div>
    <div class="title-content">
      <div class="title-logo-wrap">
        <h1 class="title-logo">Arithmetica</h1>
        <p class="title-sub">アリスメティカ</p>
        <p class="title-flavor">数字の力で塔の最深部へ</p>
      </div>
      <!-- メインメニュー -->
      <div id="title-menu">
        <button class="title-btn title-btn-main" id="btn-start">⚔️ はじめる</button>
        <button class="title-btn" id="btn-player">👤 プレーヤー変更</button>
        <button class="title-btn title-btn-google" id="btn-google">🔑 Googleでログイン</button>
        <button class="title-btn" id="btn-ranking">🏆 ランキング</button>
        <button class="title-btn title-btn-cindex" id="btn-cindex">🏠 CINDEXへ</button>
      </div>
      <!-- 難易度選択 -->
      <div id="difficulty-select" class="hidden">
        <p class="diff-title">難易度を選んでください</p>
        <div class="diff-buttons">
          <button class="diff-btn" data-diff="easy">
            <span class="diff-name">やさしい</span>
            <span class="diff-desc">1ラウンド</span>
          </button>
          <button class="diff-btn" data-diff="normal">
            <span class="diff-name">ふつう</span>
            <span class="diff-desc">2ラウンド</span>
          </button>
          <button class="diff-btn" data-diff="hard">
            <span class="diff-name">むずかしい</span>
            <span class="diff-desc">3ラウンド</span>
          </button>
        </div>
        <button class="title-btn title-btn-back" id="btn-diff-back">◀ 戻る</button>
      </div>
    </div>
  </div>

  <!-- ===== 戦闘画面 ===== -->
  <div id="screen-battle" class="screen">

    <!-- 左：敵パネル -->
    <div id="enemy-panel">
      <div id="enemy-name-lv">
        <span id="enemy-name">スライム</span>
        <span id="enemy-lv">Lv.1</span>
      </div>
      <div id="enemy-sprite-wrap">
        <img id="enemy-img" src="" alt="" onerror="this.style.display='none';document.getElementById('enemy-emoji').style.display='block'">
        <div id="enemy-emoji"></div>
      </div>
      <div id="enemy-hp-section">
        <div id="enemy-hp-bar-wrap">
          <div id="enemy-hp-bar"></div>
        </div>
        <span id="enemy-hp-text">20/20</span>
      </div>
    </div>

    <!-- 右：バトルパネル -->
    <div id="battle-panel">

      <!-- 敵行動表示（式①②の上に大きく） -->
      <div id="enemy-actions-row">
        <div class="ea-col">
          <div id="enemy-action-1" class="enemy-action-badge">⚔️攻撃</div>
        </div>
        <div class="ea-col">
          <div id="enemy-action-2" class="enemy-action-badge">🛡防御</div>
        </div>
      </div>

      <!-- 式エリア（横並び） -->
      <div id="formula-area">
        <!-- 式① -->
        <div class="formula-col" id="formula-col-1">
          <div class="formula-expr">
            <div class="formula-slot" id="slot-1-0" data-formula="1" data-pos="0">?</div>
            <button class="op-toggle" id="op-toggle-1" data-fi="0">＋</button>
            <div class="formula-slot" id="slot-1-1" data-formula="1" data-pos="1">?</div>
            <span class="formula-eq">=</span>
            <span class="formula-result" id="result-1">?</span>
          </div>
          <span class="formula-type attack" id="type-1">⚔️攻撃</span>
        </div>
        <div class="formula-divider"></div>
        <!-- 式② -->
        <div class="formula-col" id="formula-col-2">
          <div class="formula-expr">
            <div class="formula-slot" id="slot-2-0" data-formula="2" data-pos="0">?</div>
            <button class="op-toggle" id="op-toggle-2" data-fi="1">－</button>
            <div class="formula-slot" id="slot-2-1" data-formula="2" data-pos="1">?</div>
            <span class="formula-eq">=</span>
            <span class="formula-result" id="result-2">?</span>
          </div>
          <span class="formula-type defense" id="type-2">🛡防御</span>
        </div>
      </div>

      <!-- バトルログ -->
      <div id="battle-log">
        <div id="log-text">戦闘開始！</div>
      </div>

      <!-- 手札エリア -->
      <div id="hand-area">
        <div id="hand-cards"></div>
      </div>

      <!-- プレイヤーステータス（手札の下） -->
      <div id="player-status">
        <div class="pstat-hp">
          <div id="player-hp-bar-wrap">
            <div id="player-hp-bar"></div>
          </div>
          <span id="player-hp-text">20/20</span>
        </div>
        <span class="stat-item">🛡 鎧<b id="stat-armor">0</b></span>
        <span class="stat-item">⚔ 闘志<b id="stat-spirit">0</b></span>
        <span class="stat-item">💰<b id="stat-money">0</b></span>
      </div>

      <!-- 操作ボタン -->
      <div id="action-area">
        <button id="btn-go" disabled>GO！</button>
        <button id="btn-clear">クリア</button>
      </div>
    </div>

  </div><!-- #screen-battle -->

  <!-- ===== マップ画面 ===== -->
  <div id="screen-map" class="screen">
    <div id="map-header">
      <div id="map-status">
        <div id="map-hp-section">
          <div id="map-hp-bar-wrap"><div id="map-hp-bar"></div></div>
          <span id="map-hp-text">20/20</span>
        </div>
        <span class="map-stat">🛡<b id="map-armor">0</b></span>
        <span class="map-stat">⚔<b id="map-spirit">0</b></span>
        <span class="map-stat">💰<b id="map-money">0</b></span>
      </div>
      <div id="map-round-info">R<span id="map-round">1</span>/<span id="map-round-total">1</span></div>
      <button id="btn-deck-view">📖 デッキ</button>
    </div>
    <div id="map-svg-wrap">
      <svg id="map-svg" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div id="map-hint">マスをタップして進もう！</div>
  </div>

  <!-- ===== オーバーレイ群 ===== -->

  <!-- イベント -->
  <div id="overlay-event" class="overlay hidden">
    <div class="overlay-box">
      <div id="event-icon" class="overlay-icon">⛩️</div>
      <div id="event-title" class="overlay-title">神殿</div>
      <div id="event-body" class="overlay-sub">（次のフェーズで実装予定）</div>
      <button class="overlay-btn" id="btn-event-close">つぎへ</button>
    </div>
  </div>

  <!-- カード報酬 -->
  <div id="overlay-reward" class="overlay hidden">
    <div class="overlay-box reward-box">
      <div class="overlay-title">カードを1枚選ぼう！</div>
      <div id="reward-enemy-result" class="overlay-sub"></div>
      <div id="reward-cards" class="reward-cards"></div>
      <button class="overlay-btn-sub" id="btn-reward-skip">スキップ</button>
    </div>
  </div>

  <!-- デッキ確認 -->
  <div id="overlay-deck" class="overlay hidden">
    <div class="overlay-box deck-box">
      <div class="overlay-title">デッキ確認</div>
      <div id="deck-cards" class="deck-cards"></div>
      <button class="overlay-btn" id="btn-deck-close">とじる</button>
    </div>
  </div>

  <!-- バトル結果 -->
  <div id="overlay-result" class="overlay hidden">
    <div class="overlay-box">
      <div id="result-title" class="overlay-title">勝利！</div>
      <div id="result-body" class="overlay-sub"></div>
      <button class="overlay-btn" id="btn-result-next">つぎへ</button>
    </div>
  </div>

  <!-- ゲームオーバー -->
  <div id="overlay-gameover" class="overlay hidden">
    <div class="overlay-box">
      <div class="overlay-title-bad">ゲームオーバー</div>
      <p class="overlay-sub">また挑戦しよう！</p>
      <button class="overlay-btn" id="btn-retry">もう一度</button>
    </div>
  </div>

</div><!-- #game-container -->

<script src="state.js"></script>
<script src="enemy.js"></script>
<script src="abilities.js"></script>
<script src="battle.js"></script>
<script src="map.js"></script>
<script src="main.js"></script>
</body>
</html>
