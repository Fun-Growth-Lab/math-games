<svg xmlns="http://www.w3.org/2000/svg" width="480" height="300" viewBox="0 0 480 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fffaf0"/>
      <stop offset="50%"  stop-color="#f4f0ff"/>
      <stop offset="100%" stop-color="#fff0f8"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#D55E00"/>
      <stop offset="40%"  stop-color="#56B4E9"/>
      <stop offset="70%"  stop-color="#009E73"/>
      <stop offset="100%" stop-color="#E6C000"/>
    </linearGradient>
  </defs>
  <rect width="480" height="300" fill="url(#bg)"/>

  <!-- shapes scattered -->
  <circle   cx="52"  cy="72"  r="38" fill="#D55E00" opacity="0.75"/>
  <polygon  points="152,34 190,98 114,98" fill="#56B4E9" opacity="0.75"/>
  <rect     x="210" y="38" width="72" height="72" rx="10" fill="#009E73" opacity="0.75"/>
  <polygon  points="356,68 378,55 400,68 400,94 378,107 356,94" fill="#E6C000" opacity="0.75"/>

  <circle   cx="44"  cy="210" r="28" fill="#E6C000" opacity="0.6"/>
  <polygon  points="430,170 460,220 400,220" fill="#D55E00" opacity="0.6"/>
  <polygon  points="100,230 122,217 144,230 144,256 122,269 100,256" fill="#56B4E9" opacity="0.6"/>
  <rect     x="310" y="195" width="60" height="60" rx="8" fill="#009E73" opacity="0.6"/>

  <!-- title text -->
  <text x="240" y="178" text-anchor="middle"
        font-family="Georgia, serif" font-size="58" font-weight="bold"
        fill="url(#title)" letter-spacing="6">Iriscraft</text>
  <text x="240" y="212" text-anchor="middle"
        font-family="sans-serif" font-size="17" fill="#9a8a80" letter-spacing="5">色と図形の世界へ</text>
</svg>
